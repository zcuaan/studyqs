                { id: 'b_a_3_31_m_4', q: "What complications can measles cause in adults?", a: "(1) Infertility (in some cases)\n(2) Complications during pregnancy\n(3) Risk of harm to the unborn baby" },

                { id: 'b_a_3_31_m_6', q: "What does HIV do to the body?", a: "(1) Attacks immune cells\n(2) Weakens the immune system\n(3) Makes it harder to fight infections" },

                { id: 'b_a_3_31_m_12', q: "What plants does TMV affect?", a: "(1) Many plant species\n(2) Including tobacco plants\n(3) And tomato plants" },
                { id: 'b_a_3_31_m_13', q: "What causes the mosaic pattern in TMV-infected leaves?", a: "(1) Virus infects leaf cells\n(2) Damages or destroys cells\n(3) Causes discolouration" },
                { id: 'b_a_3_31_m_14', q: "Why is TMV harmful to plants?", a: "(1) Reduces photosynthesis\n(2) Less chlorophyll / damaged cells\n(3) Leads to reduced growth" },

              "Hard (5-6 marks)": [
                { id: 'b_a_3_31_h_1', q: "What do viruses do inside the body?", a: "(1) Enter host cells\n(2) Insert genetic material\n(3) Use cell machinery to replicate\n(4) Cell bursts (lysis)\n(5) New viruses infect others" },
                { id: 'b_a_3_31_h_2', q: "Explain why viral diseases are difficult to treat.", a: "(1) Viruses live inside host cells\n(2) Hard to target without damaging cells\n(3) Antibiotics do not work on viruses\n(4) Viruses replicate rapidly\n(5) Can mutate quickly\n(6) Makes treatment difficult" },
                { id: 'b_a_3_31_h_3', q: "How is HIV transmitted?", a: "(1) Unprotected sexual contact\n(2) Exchange of body fluids (e.g. blood)\n(3) Sharing needles\n(4) Unscreened blood transfusions\n(5) From mother to baby during birth\n(6) Through breastfeeding" },
                { id: 'b_a_3_31_h_4', q: "How can the spread of HIV be reduced?", a: "(1) Use condoms\n(2) Do not share needles\n(3) Use screened blood for transfusions\n(4) Test regularly\n(5) Use antiretroviral treatment\n(6) Avoid breastfeeding if HIV-positive" },
                { id: 'b_a_3_31_h_5', q: "Why are bacterial diseases less common than in the past?", a: "(1) Improved living conditions\n(2) Better sanitation\n(3) Vaccination programmes\n(4) Use of antibiotics\n(5) Improved healthcare\n(6) Better hygiene practices" },
                { id: 'b_a_3_31_h_6', q: "How can Salmonella food poisoning be prevented?", a: "(1) Cook food thoroughly\n(2) Avoid cross-contamination\n(3) Keep raw meat separate\n(4) Wash hands and surfaces\n(5) Do not wash raw chicken\n(6) Maintain good food hygiene" },
                { id: 'b_a_3_31_h_7', q: "What can happen if gonorrhoea is untreated?", a: "(1) Pelvic pain\n(2) Infertility\n(3) Ectopic pregnancy\n(4) Infection can spread\n(5) Can affect newborn babies\n(6) May cause blindness in babies" }
              ]
            }
          }
        }
      }
    };

    const ChevronLeftIcon = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m15 18-6-6 6-6"/></svg>
    );
    const RotateCcwIcon = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
    );
    const TrophyIcon = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 22V18"/><path d="M14 22V18"/><path d="M18 4H6v7a6 6 0 0 0 12 0V4Z"/></svg>
    );

    function App() {
      const [step, setStep] = useState('menu'); 
      const [path, setPath] = useState([]); 
      const [queue, setQueue] = useState([]);
      const [currentIndex, setCurrentIndex] = useState(0);
      const [showAnswer, setShowAnswer] = useState(false);
      const [sessionStats, setSessionStats] = useState({ weak: 0, medium: 0, strong: 0, count: 0 });
      const [deckStats, setDeckStats] = useState({ bad: 0, ish: 0, easy: 0, unseen: 0 });
      const [totalXP, setTotalXP] = useState(parseInt(localStorage.getItem('studyqs_xp') || '0'));
      const [streak, setStreak] = useState(0);

      useEffect(() => {
        const lastDate = localStorage.getItem('studyqs_last_active');
        const today = new Date().toDateString();
        let currentStreak = parseInt(localStorage.getItem('studyqs_streak') || '0');

        if (lastDate !== today) {
          const yesterday = new Date();
          yesterday.setDate(yesterday.getDate() - 1);
          if (lastDate !== yesterday.toDateString()) {
            currentStreak = 0;
            localStorage.setItem('studyqs_today_xp', '0');
            localStorage.setItem('studyqs_streak_claimed', '0');
          }
          localStorage.setItem('studyqs_last_active', today);
          localStorage.setItem('studyqs_streak', currentStreak.toString());
        }
        setStreak(currentStreak);
      }, []);

      const addXP = (amount) => {
        const newXP = totalXP + amount;
        setTotalXP(newXP);
        localStorage.setItem('studyqs_xp', newXP.toString());
        
        const todayXP = parseInt(localStorage.getItem('studyqs_today_xp') || '0') + amount;
        localStorage.setItem('studyqs_today_xp', todayXP.toString());
        if (todayXP >= 100 && parseInt(localStorage.getItem('studyqs_streak_claimed') || '0') === 0) {
           const newStreak = streak + 1;
           setStreak(newStreak);
           localStorage.setItem('studyqs_streak', newStreak.toString());
           localStorage.setItem('studyqs_streak_claimed', '1');
        }
      };

      const handleSelectPath = (selection) => {
        const newPath = [...path, selection];
        if (newPath.length === 5) startSession(newPath);
        else setPath(newPath);
      };

      const handleBackMenu = () => setPath(path.slice(0, -1));

      const startSession = (selectedPath) => {
        const [subj, board, topic, subtopic, diff] = selectedPath;
        const allQuestions = DATABASE[subj]?.[board]?.[topic]?.[subtopic]?.[diff] || [];
        const scores = JSON.parse(localStorage.getItem('studyqs_scores') || '{}');

        let weak = [], medium = [], unseen = [], strong = [];
        allQuestions.forEach(q => {
          const score = scores[q.id];
          if (score === 1) weak.push(q);
          else if (score === 2) medium.push(q);
          else if (score === 3) strong.push(q);
          else unseen.push(q);
        });

        const shuffle = (arr) => arr.sort(() => Math.random() - 0.5);
        let buildQueue = [...shuffle(weak), ...shuffle(medium), ...shuffle(unseen)];
        if (buildQueue.length === 0 && strong.length > 0) buildQueue = shuffle(strong);

        setDeckStats({ bad: weak.length, ish: medium.length, easy: strong.length, unseen: unseen.length });
        setPath(selectedPath);
        setQueue(buildQueue);
        setCurrentIndex(0);
        setShowAnswer(false);
        setSessionStats({ weak: 0, medium: 0, strong: 0, count: 0 });
        if (buildQueue.length > 0) setStep('playing');
        else alert("No questions found.");
      };

      const handleRate = useCallback((scoreRating) => {
        if (!showAnswer) return;
        const currentQ = queue[currentIndex];
        const scores = JSON.parse(localStorage.getItem('studyqs_scores') || '{}');
        scores[currentQ.id] = scoreRating;
        localStorage.setItem('studyqs_scores', JSON.stringify(scores));
        
        addXP(10); 

        const [subj, board, topic, subtopic, diff] = path;
        const allQuestions = DATABASE[subj]?.[board]?.[topic]?.[subtopic]?.[diff] || [];
        let b = 0, i = 0, e = 0, u = 0;
        allQuestions.forEach(q => {
          const s = scores[q.id];
          if (s === 1) b++; else if (s === 2) i++; else if (s === 3) e++; else u++;
        });
        setDeckStats({ bad: b, ish: i, easy: e, unseen: u });

        setSessionStats(prev => ({
          ...prev,
          weak: scoreRating === 1 ? prev.weak + 1 : prev.weak,
          medium: scoreRating === 2 ? prev.medium + 1 : prev.medium,
          strong: scoreRating === 3 ? prev.strong + 1 : prev.strong,
          count: prev.count + 1
        }));

        if (currentIndex + 1 < queue.length) {
          setCurrentIndex(prev => prev + 1);
          setShowAnswer(false);
        } else setStep('summary');
      }, [currentIndex, queue, showAnswer, path, totalXP, streak]);

      useEffect(() => {
        const handleKeyDown = (e) => {
          if (step !== 'playing') return;
          if (e.code === 'Space') { e.preventDefault(); if (!showAnswer) setShowAnswer(true); }
          if (showAnswer) {
            if (e.key === '1') handleRate(1);
            if (e.key === '2') handleRate(2);
            if (e.key === '3') handleRate(3);
          }
        };
        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, [step, showAnswer, handleRate]);

      const getSubjectStats = () => {
        const scores = JSON.parse(localStorage.getItem('studyqs_scores') || '{}');
        const stats = {};
        Object.keys(DATABASE).forEach(subject => {
          let totalQs = 0, easyQs = 0, seenQs = 0;
          Object.values(DATABASE[subject] || {}).forEach(topics => {
            Object.values(topics).forEach(subtopics => {
              Object.values(subtopics).forEach(difficulties => {
                Object.values(difficulties).forEach(questions => {
                  totalQs += questions.length;
                  questions.forEach(q => { 
                    if (scores[q.id]) seenQs++;
                    if (scores[q.id] === 3) easyQs++; 
                  });
                });
              });
            });
          });
          stats[subject] = { 
            percent: totalQs > 0 ? Math.round((easyQs / totalQs) * 100) : 0,
            seen: seenQs,
            total: totalQs
          };
        });
        return stats;
      };

      const renderMenu = () => {
        let options = [], title = "";
        if (path.length === 0) { title = "Select Subject"; options = Object.keys(DATABASE); }
        else if (path.length === 1) { title = "Select Exam Board"; options = Object.keys(DATABASE[path[0]] || {}); }
        else if (path.length === 2) { title = "Select Topic"; options = Object.keys(DATABASE[path[0]][path[1]] || {}); }
        else if (path.length === 3) { title = "Select Subtopic"; options = Object.keys(DATABASE[path[0]][path[1]][path[2]] || {}); }
        else if (path.length === 4) { title = "Select Difficulty"; options = Object.keys(DATABASE[path[0]][path[1]][path[2]][path[3]] || {}); }

        return (
          <div className="w-full max-w-2xl mx-auto p-6 animate-fade-in">
            <div className="flex flex-col sm:flex-row justify-between items-start gap-4 mb-8">
              <div className="text-left">
                <h1 className="text-3xl font-bold text-gray-800">studyqs</h1>
                <p className="text-gray-500 mt-1">Recall questions for GCSE</p>
                <p className="text-[10px] text-gray-400 mt-1 uppercase tracking-widest">(data is autosaved per device)</p>
              </div>
              <div className="flex gap-2">
                <div className="bg-orange-100 px-4 py-2 rounded-xl border border-orange-200 text-center min-w-[80px]">
                  <div className="text-[10px] font-bold text-orange-700 uppercase">Streak</div>
                  <div className="text-xl font-black text-orange-800">🔥 {streak}</div>
                </div>
                <div className="bg-yellow-100 px-4 py-2 rounded-xl border border-yellow-200 text-center min-w-[100px]">
                  <div className="text-[10px] font-bold text-yellow-700 uppercase">Total XP</div>
                  <div className="text-xl font-black text-yellow-800">{totalXP}</div>
                </div>
              </div>
            </div>

            {path.length > 0 && (
              <div className="flex items-center gap-2 mb-6 text-sm text-gray-600 bg-gray-50 p-3 rounded-lg border border-gray-100">
                <button onClick={handleBackMenu} className="hover:text-blue-600 flex items-center font-medium transition-colors"><ChevronLeftIcon className="w-4 h-4 mr-1" /> Back</button>
                <span className="text-gray-300">|</span><span className="truncate font-medium">{path.join(' > ')}</span>
              </div>
            )}
            
            {path.length === 0 && (
              <div className="mb-8">
                <h3 className="text-xs font-bold text-gray-400 uppercase tracking-wider mb-3 px-1">Your Knowledge Base</h3>
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                  {Object.entries(getSubjectStats()).map(([subj, stats]) => (
                    <div key={subj} className="bg-white border border-gray-200 rounded-lg p-4 shadow-sm hover:shadow-md transition-shadow">
                      <div className="flex justify-between items-center mb-2">
                        <span className="font-semibold text-gray-700">{subj}</span>
                        <span className={`text-sm font-bold ${stats.percent >= 80 ? 'text-green-500' : stats.percent >= 40 ? 'text-yellow-500' : 'text-blue-500'}`}>{stats.percent}% mastered</span>
                      </div>
                      <div className="w-full bg-gray-100 rounded-full h-1.5 mb-2 overflow-hidden">
                        <div className="bg-blue-500 h-1.5 rounded-full transition-all duration-1000" style={{ width: `${(stats.seen/stats.total)*100}%` }}></div>
                      </div>
                      <div className="text-[10px] text-gray-400 font-medium">{stats.seen} of {stats.total} cards seen</div>
                    </div>
                  ))}
                </div>
              </div>
            )}
            
            <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
              <h2 className="text-xl font-bold text-gray-800 mb-4">{title}</h2>
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                {options.map(opt => (
                  <button key={opt} onClick={() => handleSelectPath(opt)} className="p-4 text-left border border-gray-200 rounded-lg hover:border-blue-500 hover:bg-blue-50 hover:text-blue-700 transition-all font-medium text-gray-700 group flex justify-between items-center">
                    <span>{opt}</span>
                    <ChevronLeftIcon className="w-4 h-4 rotate-180 opacity-0 group-hover:opacity-100 transition-all -translate-x-2 group-hover:translate-x-0" />
                  </button>
                ))}
              </div>
            </div>
          </div>
        );
      };

      const renderPlaying = () => {
        const currentQ = queue[currentIndex];
        const progressPercent = (currentIndex / queue.length) * 100;
        return (
          <div className="w-full max-w-3xl mx-auto p-4 md:p-8 animate-fade-in flex flex-col min-h-screen justify-center relative">
            <div className="flex justify-between items-center mb-4">
              <button onClick={() => setStep('summary')} className="text-gray-400 hover:text-gray-800 flex items-center gap-2 text-sm font-medium transition-colors"><RotateCcwIcon className="w-4 h-4" /> Exit</button>
              <div className="bg-yellow-50 px-3 py-1 rounded-lg border border-yellow-100 text-yellow-700 text-[10px] font-bold uppercase tracking-wider">Session Effort: {sessionStats.count * 10} XP</div>
            </div>
            <div className="w-full bg-gray-200 rounded-full h-2.5 mb-2 overflow-hidden shadow-inner">
              <div className="bg-blue-600 h-2.5 rounded-full transition-all duration-300" style={{ width: `${progressPercent}%` }}></div>
            </div>
            <div className="text-right text-[10px] text-gray-400 font-bold uppercase mb-8">Card {currentIndex + 1} of {queue.length}</div>
            
            <div className="bg-white rounded-3xl shadow-xl border border-gray-100 min-h-[350px] flex flex-col overflow-hidden">
              <div className="p-8 md:p-12 flex-1 flex items-center justify-center text-center">
                <h2 className="text-2xl md:text-3xl font-bold text-gray-800 leading-tight">
                  {currentQ.q}
                </h2>
              </div>
              
              {!showAnswer ? (
                <div className="p-8 bg-gray-50 text-center">
                  <button onClick={() => setShowAnswer(true)} className="bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-10 rounded-2xl shadow-lg transition-all active:scale-95 w-full sm:w-auto">
                    Show Answer (Space)
                  </button>
                </div>
              ) : (
                <div className="p-8 md:p-10 bg-blue-50 animate-fade-in text-center border-t border-blue-100">
                   <p className="text-lg md:text-xl text-blue-900 mb-10 font-semibold whitespace-pre-wrap leading-relaxed italic">
                    "{currentQ.a}"
                  </p>
                   
                   <div className="grid grid-cols-3 gap-3 max-w-sm mx-auto">
                    <button onClick={() => handleRate(1)} className="p-4 bg-white border-2 border-red-100 hover:border-red-500 hover:bg-red-50 rounded-2xl transition-all shadow-sm group">
                      <span className="text-3xl group-active:scale-125 block mb-1">🙁</span>
                      <div className="text-[10px] font-black text-red-600 uppercase">None</div>
                    </button>
                    <button onClick={() => handleRate(2)} className="p-4 bg-white border-2 border-yellow-100 hover:border-yellow-500 hover:bg-yellow-50 rounded-2xl transition-all shadow-sm group">
                      <span className="text-3xl group-active:scale-125 block mb-1">😐</span>
                      <div className="text-[10px] font-black text-yellow-600 uppercase">Some</div>
                    </button>
                    <button onClick={() => handleRate(3)} className="p-4 bg-white border-2 border-green-100 hover:border-green-500 hover:bg-green-50 rounded-2xl transition-all shadow-sm group">
                      <span className="text-3xl group-active:scale-125 block mb-1">🙂</span>
                      <div className="text-[10px] font-black text-green-600 uppercase">All</div>
                    </button>
                   </div>
                </div>
              )}
            </div>
          </div>
        );
      };

      const renderSummary = () => (
        <div className="w-full max-w-2xl mx-auto p-6 text-center animate-fade-in mt-12">
          <div className="relative inline-block mb-6">
            <TrophyIcon className="w-20 h-20 text-yellow-500" />
            <div className="absolute -top-2 -right-2 bg-orange-500 text-white text-xs font-black p-2 rounded-full border-2 border-white">🔥 {streak}</div>
          </div>
          <h1 className="text-4xl font-black text-gray-800 mb-2">Session Complete!</h1>
          <p className="text-blue-600 font-bold text-xl mb-8">+{sessionStats.count * 10} XP for your effort</p>
          
          <div className="bg-white p-8 rounded-3xl border border-gray-100 shadow-lg mb-8">
            <div className="grid grid-cols-3 gap-4">
              <div>
                <div className="text-3xl font-black text-gray-800">{sessionStats.count}</div>
                <div className="text-[10px] uppercase font-bold text-gray-400 tracking-widest">Seen</div>
              </div>
              <div className="border-x border-gray-100">
                <div className="text-3xl font-black text-green-600">{sessionStats.strong}</div>
                <div className="text-[10px] uppercase font-bold text-gray-400 tracking-widest">Mastered</div>
              </div>
              <div>
                <div className="text-3xl font-black text-yellow-600">{sessionStats.medium}</div>
                <div className="text-[10px] uppercase font-bold text-gray-400 tracking-widest">Recapped</div>
              </div>
            </div>
          </div>
          
          <div className="flex flex-col sm:flex-row gap-4 justify-center">
            <button onClick={() => startSession(path)} className="px-8 py-4 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-2xl shadow-lg transition-transform active:scale-95">Revise Weak Cards</button>
            <button onClick={() => { setStep('menu'); setPath([]); }} className="px-8 py-4 bg-white border-2 border-gray-100 text-gray-700 font-bold rounded-2xl transition-all hover:border-gray-300">Home</button>
          </div>
        </div>
      );

      return (
        <React.Fragment>
          {step === 'menu' && renderMenu()}
          {step === 'playing' && renderPlaying()}
          {step === 'summary' && renderSummary()}
        </React.Fragment>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
