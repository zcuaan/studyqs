<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>studyqs - GCSE Revision</title>
  
  <script src="https://cdn.tailwindcss.com?plugins=typography,forms&v=3.5"></script>
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    
    /* Subtle Notion-style tweaks */
    body { background-color: #ffffff; color: #37352f; }
    .notion-card { border: 1px solid #e9e9e7; box-shadow: 0 1px 2px rgba(0,0,0,0.02); }
    .notion-card:hover { background-color: #f7f7f5; }
  </style>
</head>
<body class="font-sans antialiased min-h-screen selection:bg-blue-100">
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- Icons ---
    const ChevronLeft = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m15 18-6-6 6-6"/></svg>;
    const RotateCcw = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>;
    const BookOpen = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>;
    const Layers = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>;

    function App() {
      const [DATABASE, setDatabase] = useState({});
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);

      const [step, setStep] = useState('menu');
      const [path, setPath] = useState([]);
      const [queue, setQueue] = useState([]);
      const [currentIndex, setCurrentIndex] = useState(0);
      const [showAnswer, setShowAnswer] = useState(false);
      const [sessionXP, setSessionXP] = useState(0);
      const [sessionStats, setSessionStats] = useState({ weak: 0, medium: 0, strong: 0 });
      const [totalXP, setTotalXP] = useState(parseInt(localStorage.getItem('studyqs_xp') || '0'));
      const [markdownContent, setMarkdownContent] = useState('');

      // 1. Fetch CSV on startup
      useEffect(() => {
        Papa.parse('questions.csv', {
          download: true,
          header: true,
          skipEmptyLines: true,
          complete: (results) => {
            const db = {};
            results.data.forEach(row => {
              // Ensure row has the bare minimum data to avoid breaking
              if (!row.Subject || !row.Question || !row.Answer) return;
              
              db[row.Subject] ??= {};
              db[row.Subject][row.Board] ??= {};
              db[row.Subject][row.Board][row.Tier] ??= {};
              db[row.Subject][row.Board][row.Tier][row.Topic] ??= {};
              db[row.Subject][row.Board][row.Tier][row.Topic][row.Subtopic] ??= {};
              db[row.Subject][row.Board][row.Tier][row.Topic][row.Subtopic][row.Difficulty] ??= [];
              
              db[row.Subject][row.Board][row.Tier][row.Topic][row.Subtopic][row.Difficulty].push({
                id: row.ID, 
                q: row.Question, 
                a: row.Answer
              });
            });
            setDatabase(db);
            setLoading(false);
          },
          error: (err) => {
            console.error(err);
            setError("Could not load questions.csv. Make sure the file is uploaded to GitHub.");
            setLoading(false);
          }
        });
      }, []);

      const startSession = (selectedPath) => {
        const [subj, board, tier, top, sub, diff] = selectedPath;
        const allQuestions = DATABASE[subj]?.[board]?.[tier]?.[top]?.[sub]?.[diff] || [];
        const scores = JSON.parse(localStorage.getItem('studyqs_scores') || '{}');

        let weak = [], medium = [], unseen = [], strong = [];
        allQuestions.forEach(q => {
          const score = scores[q.id];
          if (score === 1) weak.push(q);
          else if (score === 2) medium.push(q);
          else if (score === 3) strong.push(q);
          else unseen.push(q);
        });

        const shuffle = (arr) => arr.sort(() => Math.random() - 0.5);
        let buildQueue = [...shuffle(weak), ...shuffle(medium), ...shuffle(unseen)];
        if (buildQueue.length === 0 && strong.length > 0) buildQueue = shuffle(strong);

        if (buildQueue.length === 0) return alert("No questions found.");

        setQueue(buildQueue);
        setCurrentIndex(0);
        setSessionXP(0);
        setSessionStats({ weak: 0, medium: 0, strong: 0 });
        setPath(selectedPath);
        setStep('playing');
      };

      // 2. Fetch Markdown file dynamically
      const openNotes = () => {
        // Clean path to create filename (e.g. biology_aqa_higher_1_cell_biology_1_1_cell_structure.md)
        let filename = path.join('_').replace(/[^a-zA-Z0-9_-]/g, '_').toLowerCase();
        filename = filename.replace(/_+/g, '_') + '.md'; 
        
        fetch(`notes/${filename}`)
          .then(res => {
            if (!res.ok) throw new Error("File not found");
            return res.text();
          })
          .then(text => {
            setMarkdownContent(marked.parse(text));
            setStep('revise');
          })
          .catch(() => {
            setMarkdownContent(marked.parse("### Notes coming soon!\n\nI haven't uploaded the study sheet for this topic to the `notes` folder yet."));
            setStep('revise');
          });
      };

      const handleSelect = (val) => {
        const newPath = [...path, val];
        if (newPath.length === 6) startSession(newPath);
        else setPath(newPath);
      };

      const handleRate = (rating) => {
        const currentQ = queue[currentIndex];
        const scores = JSON.parse(localStorage.getItem('studyqs_scores') || '{}');
        scores[currentQ.id] = rating;
        localStorage.setItem('studyqs_scores', JSON.stringify(scores));

        const newTotal = totalXP + 10;
        setTotalXP(newTotal);
        setSessionXP(prev => prev + 10);
        localStorage.setItem('studyqs_xp', newTotal.toString());

        setSessionStats(prev => ({
          ...prev,
          weak: rating === 1 ? prev.weak + 1 : prev.weak,
          medium: rating === 2 ? prev.medium + 1 : prev.medium,
          strong: rating === 3 ? prev.strong + 1 : prev.strong
        }));

        if (currentIndex + 1 < queue.length) {
          setCurrentIndex(prev => prev + 1);
          setShowAnswer(false);
        } else setStep('summary');
      };

      const getTopicStats = () => {
        if (path.length !== 3) return null;
        const [subj, board, tier] = path;
        const topics = DATABASE[subj]?.[board]?.[tier] || {};
        const scores = JSON.parse(localStorage.getItem('studyqs_scores') || '{}');
        const stats = {};

        Object.keys(topics).forEach(topic => {
          let total = 0, mastered = 0, seen = 0;
          const subtopics = topics[topic];
          Object.values(subtopics).forEach(difficulties => {
            Object.values(difficulties).forEach(questions => {
              total += questions.length;
              questions.forEach(q => {
                if (scores[q.id]) seen++;
                if (scores[q.id] === 3) mastered++;
              });
            });
          });
          stats[topic] = { total, mastered, seen, pct: total > 0 ? Math.round((mastered / total) * 100) : 0 };
        });
        return stats;
      };

      useEffect(() => {
        const handleKeyDown = (e) => {
          if (step !== 'playing') return;
          if (e.code === 'Space') { e.preventDefault(); if (!showAnswer) setShowAnswer(true); }
          if (showAnswer) {
            if (e.key === '1') handleRate(1);
            if (e.key === '2') handleRate(2);
            if (e.key === '3') handleRate(3);
          }
        };
        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, [step, showAnswer, handleRate]);

      if (loading) return <div className="min-h-screen flex items-center justify-center text-gray-400">Loading database...</div>;
      if (error) return <div className="min-h-screen flex items-center justify-center text-red-500 font-bold px-6 text-center">{error}</div>;

      let currentView = null;

      // === RENDER MENU ===
      if (step === 'menu') {
        let options = [], title = "";
        if (path.length === 0) { title = "Subjects"; options = Object.keys(DATABASE); }
        else if (path.length === 1) { title = "Exam Board"; options = Object.keys(DATABASE[path[0]] || {}); }
        else if (path.length === 2) { title = "Tier"; options = Object.keys(DATABASE[path[0]][path[1]] || {}); }
        else if (path.length === 3) { title = "Topics"; options = Object.keys(DATABASE[path[0]][path[1]][path[2]] || {}); }
        else if (path.length === 4) { title = "Subtopics"; options = Object.keys(DATABASE[path[0]][path[1]][path[2]][path[3]] || {}); }
        else if (path.length === 5) { title = path[4]; options = Object.keys(DATABASE[path[0]][path[1]][path[2]][path[3]][path[4]] || {}); }

        const topicStats = path.length === 3 ? getTopicStats() : null;

        currentView = (
          <div className="w-full max-w-3xl mx-auto p-6 md:p-10 animate-fade-in pb-24">
            {/* Header */}
            <div className="flex justify-between items-end mb-12 border-b border-gray-100 pb-6">
              <div>
                <h1 className="text-3xl font-bold tracking-tight mb-1">studyqs</h1>
                <p className="text-sm text-gray-500 font-medium">GCSE revision + recall</p>
                <p className="text-[10px] text-gray-400 uppercase tracking-widest mt-1">progress is autosaved per device</p>
              </div>
              <div className="text-right">
                <div className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">Total XP</div>
                <div className="text-xl font-bold text-gray-800">{totalXP}</div>
              </div>
            </div>

            {/* Breadcrumbs */}
            {path.length > 0 && (
              <button onClick={() => setPath(path.slice(0, -1))} className="flex items-center text-sm font-medium text-gray-400 hover:text-gray-800 transition-colors mb-6">
                <ChevronLeft /> <span className="ml-1">{path.join(' / ')}</span>
              </button>
            )}

            <h2 className="text-xl font-semibold mb-6">{title}</h2>

            {/* Level 0: Subjects (No Progress Bars) */}
            {path.length === 0 && (
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                {options.map(subj => (
                  <button key={subj} onClick={() => handleSelect(subj)} className="text-left p-5 rounded-lg notion-card transition-colors group block w-full">
                    <span className="text-lg font-semibold text-gray-800 group-hover:text-blue-600 transition-colors">{subj}</span>
                  </button>
                ))}
              </div>
            )}

            {/* Level 3: Topics with Progress Bars */}
            {path.length === 3 && (
              <div className="grid grid-cols-1 gap-3">
                {Object.entries(topicStats).map(([topic, s]) => (
                  <button key={topic} onClick={() => handleSelect(topic)} className="text-left p-5 rounded-lg notion-card transition-colors group block w-full">
                    <div className="flex justify-between items-center mb-4">
                      <span className="text-lg font-semibold text-gray-800 truncate mr-2 group-hover:text-blue-600 transition-colors" title={topic}>{topic}</span>
                      <span className="text-sm font-medium text-gray-400 whitespace-nowrap">{s.pct}% mastered</span>
                    </div>
                    <div className="w-full bg-gray-100 rounded-full h-1.5 mb-3 overflow-hidden">
                      <div className="bg-gray-800 h-1.5 rounded-full transition-all duration-1000" style={{ width: `${s.pct}%` }} />
                    </div>
                    <div className="text-xs text-gray-400">{s.seen} of {s.total} cards seen</div>
                  </button>
                ))}
              </div>
            )}

            {/* Subtopic Dashboard (Notion Style) */}
            {path.length === 5 ? (
              <div className="space-y-8 animate-fade-in">
                {/* Option 1: Study Notes */}
                <div>
                  <div className="text-xs font-bold text-gray-400 uppercase tracking-widest mb-3">Learn</div>
                  <button onClick={openNotes} className="w-full flex items-center p-4 rounded-lg notion-card transition-colors text-left group">
                    <div className="bg-gray-100 p-2 rounded text-gray-600 mr-4 group-hover:bg-blue-50 group-hover:text-blue-600 transition-colors"><BookOpen /></div>
                    <div>
                      <div className="font-semibold text-gray-800">Study Sheet</div>
                      <div className="text-sm text-gray-500 mt-0.5">Read notes and diagrams for this topic</div>
                    </div>
                  </button>
                </div>

                {/* Option 2: Flashcards */}
                <div>
                  <div className="text-xs font-bold text-gray-400 uppercase tracking-widest mb-3">Recall</div>
                  <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
                    {options.map(diff => (
                      <button key={diff} onClick={() => handleSelect(diff)} className="flex items-center p-4 rounded-lg notion-card transition-colors text-left group">
                        <div className="bg-gray-100 p-2 rounded text-gray-600 mr-3 group-hover:bg-green-50 group-hover:text-green-600 transition-colors"><Layers /></div>
                        <div className="font-medium text-gray-800">{diff.split(' ')[0]}</div>
                      </button>
                    ))}
                  </div>
                </div>
              </div>
            ) : null }

            {/* Standard Menu List for other levels */}
            {(path.length !== 0 && path.length !== 3 && path.length !== 5) && (
              <div className="flex flex-col gap-2">
                {options.map(opt => (
                  <button key={opt} onClick={() => handleSelect(opt)} className="w-full text-left p-4 rounded-lg notion-card font-medium transition-colors">
                    {opt}
                  </button>
                ))}
              </div>
            )}
          </div>
        );
      }

      // === RENDER REVISE MODE (MARKDOWN) ===
      else if (step === 'revise') {
        currentView = (
          <div className="w-full max-w-3xl mx-auto p-6 md:p-10 animate-fade-in pb-24">
            <div className="flex justify-between items-center mb-8 border-b border-gray-100 pb-6">
              <button onClick={() => setStep('menu')} className="flex items-center text-sm font-medium text-gray-400 hover:text-gray-800 transition-colors">
                <ChevronLeft /> Back to Menu
              </button>
            </div>
            
            {/* Tailwind Typography Plugin handles all the styling perfectly here */}
            <div 
              className="prose prose-gray max-w-none"
              dangerouslySetInnerHTML={{ __html: markdownContent }}
            />
          </div>
        );
      }

      // === RENDER PLAYING (FLASHCARDS) ===
      else if (step === 'playing') {
        const q = queue[currentIndex];
        const progress = ((currentIndex + 1) / queue.length) * 100;
        currentView = (
          <div className="w-full max-w-3xl mx-auto p-6 md:p-10 animate-fade-in flex flex-col min-h-screen pb-24">
            <div className="flex justify-between items-center mb-6">
              <button onClick={() => setStep('summary')} className="text-gray-400 hover:text-gray-800 flex items-center text-sm font-medium transition-colors">
                <RotateCcw /> <span className="ml-2">Exit</span>
              </button>
              <div className="text-xs font-bold text-gray-400 uppercase tracking-widest">{currentIndex + 1} / {queue.length}</div>
            </div>
            
            <div className="w-full bg-gray-100 rounded-full h-1 mb-8">
              <div className="bg-gray-800 h-1 rounded-full transition-all duration-300" style={{ width: `${progress}%` }} />
            </div>
            
            <div className="flex-1 flex flex-col items-center justify-center w-full pb-10">
              {/* Thin bordered card container */}
              <div className="w-full max-w-2xl border border-gray-200 rounded-2xl p-8 md:p-12 min-h-[350px] flex flex-col justify-center bg-white shadow-sm relative">
                
                <h2 className="text-2xl md:text-3xl font-semibold leading-relaxed text-center mb-10 text-gray-800">
                  {q.q}
                </h2>
                
                {!showAnswer ? (
                  <div className="text-center mt-auto">
                    <button onClick={() => setShowAnswer(true)} className="px-6 py-3 rounded-lg border border-gray-200 font-medium hover:bg-gray-50 transition-colors text-gray-700">
                      Show Answer (Space)
                    </button>
                  </div>
                ) : (
                  <div className="animate-fade-in mt-auto flex flex-col items-center w-full">
                    <div className="w-full border-t border-gray-100 pt-8 mb-10">
                      <p className="text-lg text-gray-600 whitespace-pre-wrap leading-relaxed text-center">
                        {q.a}
                      </p>
                    </div>
                    
                    <p className="text-xs font-bold text-gray-400 uppercase tracking-widest text-center mb-4">how did you do?</p>
                    <div className="grid grid-cols-3 gap-3 w-full max-w-md">
                      <button onClick={() => handleRate(1)} className="py-3 rounded-lg border border-gray-200 font-medium hover:bg-red-50 hover:text-red-600 hover:border-red-200 transition-colors text-gray-600">🙁 Bad</button>
                      <button onClick={() => handleRate(2)} className="py-3 rounded-lg border border-gray-200 font-medium hover:bg-yellow-50 hover:text-yellow-600 hover:border-yellow-200 transition-colors text-gray-600">😐 Meh</button>
                      <button onClick={() => handleRate(3)} className="py-3 rounded-lg border border-gray-200 font-medium hover:bg-green-50 hover:text-green-600 hover:border-green-200 transition-colors text-gray-600">🙂 Easy</button>
                    </div>
                  </div>
                )}
              </div>
            </div>
          </div>
        );
      }

      // === RENDER SUMMARY ===
      else if (step === 'summary') {
        const totalAnswered = sessionStats.weak + sessionStats.medium + sessionStats.strong;
        currentView = (
          <div className="w-full max-w-xl mx-auto p-6 md:p-10 text-center animate-fade-in flex flex-col justify-center min-h-screen pb-24">
            <h1 className="text-3xl font-bold mb-2">Session Complete</h1>
            <p className="text-gray-500 font-medium mb-10">+{sessionXP} XP Earned</p>
            
            <div className="border border-gray-200 rounded-lg p-6 mb-10 flex justify-between items-center text-center divide-x divide-gray-100 bg-white shadow-sm">
              <div className="flex-1"><div className="text-2xl font-bold">{totalAnswered}</div><div className="text-xs text-gray-400 mt-1 uppercase">Cards</div></div>
              <div className="flex-1"><div className="text-2xl font-bold">{sessionStats.weak}</div><div className="text-xs text-red-400 mt-1 uppercase">Bad</div></div>
              <div className="flex-1"><div className="text-2xl font-bold">{sessionStats.medium}</div><div className="text-xs text-yellow-400 mt-1 uppercase">Meh</div></div>
              <div className="flex-1"><div className="text-2xl font-bold">{sessionStats.strong}</div><div className="text-xs text-green-400 mt-1 uppercase">Easy</div></div>
            </div>
            
            <div className="flex flex-col sm:flex-row gap-3 justify-center">
              <button onClick={() => startSession(path)} className="px-6 py-3 bg-gray-900 text-white rounded-lg font-medium hover:bg-gray-800 transition-colors shadow-sm">Practice Again</button>
              <button onClick={() => { setStep('menu'); setPath([]); }} className="px-6 py-3 border border-gray-200 bg-white rounded-lg font-medium hover:bg-gray-50 transition-colors shadow-sm">Home</button>
            </div>
          </div>
        );
      }

      // Return the current view + the globally fixed footer
      return (
        <React.Fragment>
          {currentView}
          
          {/* Subtle Corner Footer */}
          <div className="fixed bottom-4 right-4 text-right text-[10px] sm:text-xs text-gray-500 hover:text-gray-400 transition-colors z-50">
            <p>a <a href="https://targettuition.com/" target="_blank" rel="noopener noreferrer" className="font-semibold underline">Target Tuition</a> company</p>
            <p className="mt-0.5">if you like this, please support by donating <a href="https://donate.stripe.com/dRm7sL3xJ8xe3deb1Eco00a" target="_blank" rel="noopener noreferrer" className="font-semibold underline">[here]</a>!!</p>
          </div>
        </React.Fragment>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
