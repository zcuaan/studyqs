    function App() {
      const [step, setStep] = useState('menu'); 
      const [path, setPath] = useState([]); 
      
      const [queue, setQueue] = useState([]);
      const [currentIndex, setCurrentIndex] = useState(0);
      const [showAnswer, setShowAnswer] = useState(false);
      const [sessionStats, setSessionStats] = useState({ weak: 0, medium: 0, strong: 0 });
      const [isDeckMastered, setIsDeckMastered] = useState(false);
      const [deckStats, setDeckStats] = useState({ bad: 0, ish: 0, easy: 0, unseen: 0 });

      const handleSelectPath = (selection) => {
        const newPath = [...path, selection];
        if (newPath.length === 5) startSession(newPath);
        else setPath(newPath);
      };

      const handleBackMenu = () => setPath(path.slice(0, -1));

      const startSession = (selectedPath) => {
        const [subj, board, topic, subtopic, diff] = selectedPath;
        const allQuestions = DATABASE[subj]?.[board]?.[topic]?.[subtopic]?.[diff] || [];
        const scores = JSON.parse(localStorage.getItem('studyqs_scores') || '{}');

        let weak = [], medium = [], unseen = [], strong = [];
        allQuestions.forEach(q => {
          const score = scores[q.id];
          if (score === 1) weak.push(q);
          else if (score === 2) medium.push(q);
          else if (score === 3) strong.push(q);
          else unseen.push(q);
        });

        const shuffle = (arr) => arr.sort(() => Math.random() - 0.5);
        let buildQueue = [...shuffle(weak), ...shuffle(medium), ...shuffle(unseen)];
        let masteredFlag = false;

        if (buildQueue.length === 0 && strong.length > 0) {
          buildQueue = shuffle(strong);
          masteredFlag = true;
        }

        setDeckStats({ bad: weak.length, ish: medium.length, easy: strong.length, unseen: unseen.length });
        setPath(selectedPath);
        setQueue(buildQueue);
        setCurrentIndex(0);
        setShowAnswer(false);
        setSessionStats({ weak: 0, medium: 0, strong: 0 });
        setIsDeckMastered(masteredFlag);
        
        if (buildQueue.length > 0) setStep('playing');
        else {
          alert("No questions found.");
          setPath(selectedPath.slice(0, -1)); 
        }
      };

      const handleRate = useCallback((scoreRating) => {
        if (!showAnswer) return;
        const currentQ = queue[currentIndex];
        const scores = JSON.parse(localStorage.getItem('studyqs_scores') || '{}');
        scores[currentQ.id] = scoreRating;
        localStorage.setItem('studyqs_scores', JSON.stringify(scores));

        const [subj, board, topic, subtopic, diff] = path;
        const allQuestions = DATABASE[subj]?.[board]?.[topic]?.[subtopic]?.[diff] || [];
        let b = 0, i = 0, e = 0, u = 0;
        allQuestions.forEach(q => {
          const s = scores[q.id];
          if (s === 1) b++; else if (s === 2) i++; else if (s === 3) e++; else u++;
        });
        setDeckStats({ bad: b, ish: i, easy: e, unseen: u });

        setSessionStats(prev => ({
          ...prev,
          weak: scoreRating === 1 ? prev.weak + 1 : prev.weak,
          medium: scoreRating === 2 ? prev.medium + 1 : prev.medium,
          strong: scoreRating === 3 ? prev.strong + 1 : prev.strong
        }));

        if (currentIndex + 1 < queue.length) {
          setCurrentIndex(prev => prev + 1);
          setShowAnswer(false);
        } else setStep('summary');
      }, [currentIndex, queue, showAnswer, path]);

      useEffect(() => {
        const handleKeyDown = (e) => {
          if (step !== 'playing') return;
          if (e.code === 'Space') { e.preventDefault(); if (!showAnswer) setShowAnswer(true); }
          if (showAnswer) {
            if (e.key === '1') handleRate(1);
            if (e.key === '2') handleRate(2);
            if (e.key === '3') handleRate(3);
          }
        };
        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, [step, showAnswer, handleRate]);

      const getSubjectStats = () => {
        const scores = JSON.parse(localStorage.getItem('studyqs_scores') || '{}');
        const stats = {};
        Object.keys(DATABASE).forEach(subject => {
          let totalQs = 0, easyQs = 0;
          Object.values(DATABASE[subject] || {}).forEach(topics => {
            Object.values(topics).forEach(subtopics => {
              Object.values(subtopics).forEach(difficulties => {
                Object.values(difficulties).forEach(questions => {
                  totalQs += questions.length;
                  questions.forEach(q => { if (scores[q.id] === 3) easyQs++; });
                });
              });
            });
          });
          stats[subject] = totalQs > 0 ? Math.round((easyQs / totalQs) * 100) : 0;
        });
        return stats;
      };

      const renderMenu = () => {
        let options = [], title = "";
        if (path.length === 0) { title = "Select Subject"; options = Object.keys(DATABASE); }
        else if (path.length === 1) { title = "Select Exam Board"; options = Object.keys(DATABASE[path[0]] || {}); }
        else if (path.length === 2) { title = "Select Topic"; options = Object.keys(DATABASE[path[0]][path[1]] || {}); }
        else if (path.length === 3) { title = "Select Subtopic"; options = Object.keys(DATABASE[path[0]][path[1]][path[2]] || {}); }
        else if (path.length === 4) { title = "Select Difficulty"; options = Object.keys(DATABASE[path[0]][path[1]][path[2]][path[3]] || {}); }

        return (
          <div className="w-full max-w-2xl mx-auto p-6 animate-fade-in">
            <div className="text-center mb-8">
              <h1 className="text-3xl font-bold text-gray-800">studyqs</h1>
              <p className="text-gray-500 mt-2">Recall questions for GCSE \n (data is autosaved per device)</p>
            </div>
            {path.length > 0 && (
              <div className="flex items-center gap-2 mb-6 text-sm text-gray-600 bg-gray-50 p-3 rounded-lg">
                <button onClick={handleBackMenu} className="hover:text-blue-600 flex items-center font-medium"><ChevronLeftIcon className="w-4 h-4 mr-1" /> Back</button>
                <span className="text-gray-300">|</span><span className="truncate">{path.join(' > ')}</span>
              </div>
            )}
            {path.length === 0 && (
              <div className="mb-8">
                <h3 className="text-xs font-bold text-gray-400 uppercase tracking-wider mb-3 px-1">Your Progress</h3>
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                  {Object.entries(getSubjectStats()).map(([subj, percent]) => (
                    <div key={subj} className="bg-white border border-gray-200 rounded-lg p-4 shadow-sm flex items-center justify-between">
                      <span className="font-semibold text-gray-700">{subj}</span>
                      <div className="text-right">
                        <span className={`text-lg font-bold ${percent >= 80 ? 'text-green-500' : percent >= 40 ? 'text-yellow-500' : 'text-blue-500'}`}>{percent}%</span>
                        <span className="text-xs text-gray-400 ml-1 font-medium">comfortable</span>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}
            <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
              <h2 className="text-xl font-semibold text-gray-800 mb-4">{title}</h2>
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                {options.map(opt => {
                  let stats = null;
                  if (path.length === 4) {
                     const allQs = DATABASE[path[0]][path[1]][path[2]][path[3]][opt] || [];
                     const scores = JSON.parse(localStorage.getItem('studyqs_scores') || '{}');
                     let b=0, i=0, e=0, u=0;
                     allQs.forEach(q => { const s = scores[q.id]; if (s === 1) b++; else if (s === 2) i++; else if (s === 3) e++; else u++; });
                     stats = { b, i, e, u };
                  }
                  return (
                    <button key={opt} onClick={() => handleSelectPath(opt)} className="p-4 text-left border border-gray-200 rounded-lg hover:border-blue-500 hover:bg-blue-50 hover:text-blue-700 transition-all font-medium text-gray-700 flex justify-between items-center">
                      <span>{opt}</span>
                      {stats && <div className="flex gap-2 text-xs font-bold bg-white px-2 py-1 rounded shadow-sm border border-gray-100"><span className="text-gray-400">{stats.u}</span><span className="text-red-500">{stats.b}</span><span className="text-yellow-500">{stats.i}</span><span className="text-green-500">{stats.e}</span></div>}
                    </button>
                  );
                })}
              </div>
            </div>
          </div>
        );
      };

      const renderPlaying = () => {
        const currentQ = queue[currentIndex];
        const progressPercent = (currentIndex / queue.length) * 100;
        return (
          <div className="w-full max-w-3xl mx-auto p-4 md:p-8 animate-fade-in flex flex-col min-h-screen justify-center">
            <div className="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-4 mb-4">
              <button onClick={() => setStep('summary')} className="text-gray-500 hover:text-gray-800 flex items-center gap-2 text-sm font-medium transition-colors"><RotateCcwIcon className="w-4 h-4" /> Exit Session</button>
              <div className="text-sm font-semibold text-gray-600 bg-gray-100 px-4 py-1.5 rounded-full text-center">{path.join(' • ')}</div>
            </div>
            <div className="flex flex-wrap justify-center gap-4 sm:gap-8 text-sm font-bold bg-white px-4 py-3 rounded-xl border border-gray-200 shadow-sm mb-6"><span className="text-gray-500">Left: {deckStats.unseen}</span><span className="text-red-500">🙁: {deckStats.bad}</span><span className="text-yellow-600">😐: {deckStats.ish}</span><span className="text-green-500">🙂: {deckStats.easy}</span></div>
            <div className="w-full bg-gray-200 rounded-full h-2.5 mb-2"><div className="bg-blue-600 h-2.5 rounded-full transition-all duration-300" style={{ width: `${progressPercent}%` }}></div></div>
            <div className="text-right text-xs text-gray-500 font-medium mb-8">{currentIndex + 1} of {queue.length}</div>
            <div className="bg-white rounded-2xl shadow-lg border border-gray-100 min-h-[300px] flex flex-col">
              <div className="p-8 md:p-12 flex-1 flex items-center justify-center text-center"><h2 className="text-2xl md:text-3xl font-semibold text-gray-800 leading-relaxed">{currentQ.q}</h2></div>
              <div className="border-t border-gray-100"></div>
              {!showAnswer ? (
                <div className="p-6 bg-gray-50 rounded-b-2xl text-center"><button onClick={() => setShowAnswer(true)} className="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-8 rounded-lg shadow-sm transition-colors w-full md:w-auto">Show Answer (Space)</button></div>
              ) : (
                <div className="p-8 md:p-12 bg-blue-50 rounded-b-2xl animate-fade-in text-center">
                   <p className="text-lg md:text-xl text-blue-900 mb-8 font-medium whitespace-pre-wrap">{currentQ.a}</p>
                   <p className="text-sm text-gray-500 mb-4 font-medium uppercase tracking-wider">how was it?</p>
                   <div className="flex flex-col sm:flex-row justify-center gap-4">
                    <button onClick={() => handleRate(1)} className="flex-1 max-w-[150px] mx-auto flex flex-col items-center p-4 bg-white border border-red-200 hover:bg-red-50 rounded-xl transition-all shadow-sm"><span className="text-3xl mb-2">🙁</span><span className="text-sm font-bold text-red-600 text-center">bad</span></button>
                    <button onClick={() => handleRate(2)} className="flex-1 max-w-[150px] mx-auto flex flex-col items-center p-4 bg-white border border-yellow-200 hover:bg-yellow-50 rounded-xl transition-all shadow-sm"><span className="text-3xl mb-2">😐</span><span className="text-sm font-bold text-yellow-600 text-center">ish</span></button>
                    <button onClick={() => handleRate(3)} className="flex-1 max-w-[150px] mx-auto flex flex-col items-center p-4 bg-white border border-green-200 hover:bg-green-50 rounded-xl transition-all shadow-sm"><span className="text-3xl mb-2">🙂</span><span className="text-sm font-bold text-green-600 text-center">easy</span></button>
                   </div>
                </div>
              )}
            </div>
          </div>
        );
      };

      const renderSummary = () => (
        <div className="w-full max-w-2xl mx-auto p-6 text-center animate-fade-in mt-12">
          <h1 className="text-3xl font-bold text-gray-800 mb-2">Session Complete!</h1>
          <p className="text-gray-500 mb-8">Here's how you did.</p>
          <div className="grid grid-cols-3 gap-4 mb-8">
            <div className="bg-white border border-gray-100 p-6 rounded-xl shadow-sm"><div className="text-3xl mb-2">🙁</div><div className="text-2xl font-bold text-gray-800">{sessionStats.weak}</div></div>
            <div className="bg-white border border-gray-100 p-6 rounded-xl shadow-sm"><div className="text-3xl mb-2">😐</div><div className="text-2xl font-bold text-gray-800">{sessionStats.medium}</div></div>
            <div className="bg-white border border-gray-100 p-6 rounded-xl shadow-sm"><div className="text-3xl mb-2">🙂</div><div className="text-2xl font-bold text-gray-800">{sessionStats.strong}</div></div>
          </div>
          <div className="flex flex-col sm:flex-row gap-4 justify-center">
            <button onClick={() => startSession(path)} className="px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg shadow-sm transition-colors">Revise Again</button>
            <button onClick={() => { setStep('menu'); setPath([]); }} className="px-6 py-3 bg-white border border-gray-200 hover:bg-gray-50 text-gray-700 font-semibold rounded-lg shadow-sm transition-colors">Back to Home</button>
          </div>
        </div>
      );

      return (
        <React.Fragment>
          {step === 'menu' && renderMenu()}
          {step === 'playing' && renderPlaying()}
          {step === 'summary' && renderSummary()}
        </React.Fragment>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
