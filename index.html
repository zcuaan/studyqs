                { id: 'b_a_h_2_22_h_1', q: "Describe how platelets help blood to clot after a wound.", a: "(1) Platelets collect at the wound\n(2) Enzymes convert fibrinogen into fibrin\n(3) Fibrin forms a network of protein fibres\n(4) Red blood cells and platelets get trapped in the fibres\n(5) A clot forms to stop blood loss\n(6) The clot dries into a scab" },
                { id: 'b_a_h_2_22_h_2', q: "Explain why blood clotting is important after injury.", a: "(1) Prevents excessive blood loss\n(2) Forms a clot over the wound\n(3) Clot dries into a scab\n(4) Scab protects new skin as it grows\n(5) Reduces entry of pathogens\n(6) Helps prevent infection" },
                { id: 'b_a_h_2_22_h_3', q: "Describe the composition of blood and the function of each component.", a: "(1) Plasma transports dissolved substances\n(2) Red blood cells transport oxygen\n(3) White blood cells defend against pathogens\n(4) Platelets help blood clot\n(5) Plasma makes up about 55% of blood\n(6) Red blood cells make up about 45% of blood" },
                { id: 'b_a_h_2_22_h_4', q: "Explain how urea is produced and removed from the body.", a: "(1) Excess proteins are broken down into amino acids\n(2) Excess amino acids cannot be stored\n(3) They are broken down in the liver\n(4) Urea is produced as a waste product\n(5) Urea is carried in blood plasma to the kidneys\n(6) Kidneys remove urea from the blood to form urine" },
                { id: 'b_a_h_2_22_h_5', q: "Compare arteries, veins and capillaries.", a: "(1) Arteries carry blood away from the heart\n(2) Veins carry blood towards the heart\n(3) Capillaries connect arteries and veins\n(4) Arteries have thick elastic walls to withstand high pressure\n(5) Veins have valves to prevent backflow\n(6) Capillaries have one-cell-thick walls for diffusion" },
                { id: 'b_a_h_2_22_h_6', q: "Explain how the structure of capillaries helps substances move between blood and body cells.", a: "(1) Capillaries form networks close to body cells\n(2) This gives a short diffusion distance\n(3) Walls are one cell thick\n(4) This allows rapid diffusion\n(5) Walls are permeable, so substances can pass through\n(6) Large surface area allows efficient exchange" },
                { id: 'b_a_h_2_22_h_7', q: "Explain why humans have a double circulatory system.", a: "(1) Blood travels from the heart to the lungs\n(2) Blood picks up oxygen in the lungs\n(3) Blood returns to the heart\n(4) The heart pumps oxygenated blood to the body at high pressure\n(5) This allows rapid delivery of oxygen and glucose to cells\n(6) This supports a high rate of respiration" },
                { id: 'b_a_h_2_22_h_8', q: "Explain how arteries are adapted to carry blood at high pressure.", a: "(1) Arteries carry blood directly from the heart\n(2) Blood is under high pressure\n(3) Thick walls prevent bursting\n(4) Elastic fibres stretch when blood surges through\n(5) Elastic fibres recoil to maintain pressure\n(6) Muscle layer helps control blood flow" },
                { id: 'b_a_h_2_22_h_9', q: "Compare the structures of arteries, veins and capillaries.", a: "(1) Arteries have thick walls\n(2) Arteries have a small lumen\n(3) Arteries contain thick muscle and elastic fibres\n(4) Veins have thin walls and large lumens\n(5) Veins often have valves\n(6) Capillaries are tiny vessels with walls one cell thick" },
                { id: 'b_a_h_2_22_h_10', q: "Explain how a stent is used to treat coronary heart disease.", a: "(1) A stent is a small metal mesh tube\n(2) It is inserted into a narrowed coronary artery\n(3) A tiny balloon expands the stent\n(4) This widens the artery\n(5) The stent stays in place after the balloon is removed\n(6) This improves blood flow to the heart muscle" },
                { id: 'b_a_h_2_22_h_11', q: "Explain how coronary heart disease can lead to a heart attack.", a: "(1) Fatty material builds up in coronary arteries\n(2) The arteries become narrowed\n(3) Less blood reaches the heart muscle\n(4) Less oxygen reaches heart muscle cells\n(5) Heart muscle cells cannot respire enough\n(6) Heart muscle cells may die, causing a heart attack" },
                { id: 'b_a_h_2_22_h_12', q: "Compare stents, statins and bypass surgery as treatments for coronary heart disease.", a: "(1) Stents widen narrowed arteries to improve blood flow\n(2) Stents act quickly and do not usually need general anaesthetic\n(3) Statins lower cholesterol and slow further fatty deposits\n(4) Statins are long-term medication\n(5) Bypass surgery replaces or bypasses blocked arteries using blood vessels from elsewhere\n(6) Bypass surgery is more invasive and usually used when other treatments are unsuitable" },
                { id: 'b_a_h_2_22_h_13', q: "Describe how bypass surgery can treat coronary heart disease.", a: "(1) A blood vessel is taken from another part of the body\n(2) It is attached around the blocked or narrowed coronary artery\n(3) This creates a new route for blood flow\n(4) More blood reaches the heart muscle\n(5) More oxygen reaches heart muscle cells\n(6) This reduces the risk of heart attack" },
                { id: 'b_a_h_2_22_h_14', q: "Describe the full route of blood through the double circulatory system.", a: "(1) Blood from the body enters the heart through the vena cava\n(2) It enters the right atrium, then the right ventricle\n(3) The right ventricle pumps blood through the pulmonary artery to the lungs\n(4) Blood returns from the lungs through the pulmonary vein to the left atrium\n(5) It moves into the left ventricle\n(6) The left ventricle pumps blood through the aorta to the body tissues" },
                { id: 'b_a_h_2_22_h_15', q: "Explain why the human circulatory system is described as a double circulatory system.", a: "(1) Blood passes through the heart twice in one full circuit\n(2) One circuit carries blood between the heart and lungs\n(3) This is the pulmonary circulation\n(4) One circuit carries blood between the heart and the rest of the body\n(5) This is the systemic circulation\n(6) This allows oxygenated blood to be pumped around the body at high pressure" },
                { id: 'b_a_h_2_22_h_16', q: "Compare mechanical and biological heart valves.", a: "(1) Mechanical valves are made from man-made materials\n(2) Mechanical valves last a long time\n(3) Mechanical valves increase risk of blood clots\n(4) Patients may need lifelong blood-thinning medication\n(5) Biological valves are made from animal or human tissue\n(6) Biological valves may need replacing after 12–15 years" },
                { id: 'b_a_h_2_22_h_17', q: "Explain how faulty heart valves can affect the body.", a: "(1) Valves may not close properly\n(2) Blood can leak backwards\n(3) Or valves may become stiff and not open fully\n(4) Less blood is pumped around the body\n(5) Less oxygen reaches body cells\n(6) This can cause breathlessness or serious illness" },
                { id: 'b_a_h_2_22_h_18', q: "Compare heart transplants and artificial hearts.", a: "(1) A heart transplant uses a donor heart\n(2) Donor hearts are not always available\n(3) Donor heart must be a tissue match\n(4) Artificial hearts can keep a patient alive while waiting for a transplant\n(5) Artificial hearts are expensive\n(6) Artificial hearts increase risk of blood clots" },
                { id: 'b_a_h_2_22_h_19', q: "Explain how an artificial pacemaker helps treat an irregular heartbeat.", a: "(1) An irregular rhythm can make the heart pump inefficiently\n(2) This reduces oxygen delivery to cells\n(3) The pacemaker is implanted in the chest\n(4) Wires connect it to the heart\n(5) It sends electrical impulses to the heart muscle\n(6) These impulses stimulate regular contractions" }
              ]
            },
              "2.3 Plant tissues, organs and systems": {
                "Easy (1-2 marks)": [
                  { id: 'b_a_2_23_e_1', q: "Are xylem and phloem part of the plant transport system?", a: "(1) Yes\n(2) They are tissues, not organs" },
                  { id: 'b_a_2_23_e_2', q: "What are root hair cells specialised to do?", a: "(1) Absorb water by osmosis\n(2) Absorb mineral ions by active transport" },
                  { id: 'b_a_2_23_e_3', q: "What are mineral ions used for in plants?", a: "(1) To make proteins\n(2) To make other molecules" },

                  { id: 'b_a_2_23_e_5', q: "How does water help the plant stay upright?", a: "(1) Creates turgor pressure" },
                  { id: 'b_a_2_23_e_6', q: "What is transpiration?", a: "(1) Loss of water vapour from leaves" },
                  { id: 'b_a_2_23_e_7', q: "Does the leaf keep most of the water?", a: "(1) No\n(2) Most is lost" },
                  { id: 'b_a_2_23_e_8', q: "Where are stomata found?", a: "(1) Mainly on the underside of leaves" },
                  { id: 'b_a_2_23_e_9', q: "What are guard cells specialised to do?", a: "(1) Control gas exchange\n(2) Control water loss" },
                  { id: 'b_a_2_23_e_10', q: "What is the function of stomata?", a: "(1) Allow gases to enter and leave by diffusion" },
                  { id: 'b_a_2_23_e_11', q: "What is water potential?", a: "(1) The tendency for water to move by osmosis" },
                  { id: 'b_a_2_23_e_12', q: "Why can’t stomata remain closed?", a: "(1) Gases would not be able to diffuse in and out" },
                  { id: 'b_a_2_23_e_13', q: "What is humidity?", a: "(1) The amount of water vapour in the air" },
                  { id: 'b_a_2_23_e_14', q: "What is the function of the phloem?", a: "(1) Transports sugars (food)\n(2) From leaves to the rest of the plant" },
                  { id: 'b_a_2_23_e_15', q: "What is cell sap?", a: "(1) Water with dissolved sugars\n(2) May also contain mineral ions" },
                  { id: 'b_a_2_23_e_16', q: "What is translocation?", a: "(1) Movement of sugars in the phloem" },
                  { id: 'b_a_2_23_e_17', q: "Why is the shoot of a plant cut at a slant?", a: "(1) Increases surface area for water uptake" },
                  { id: 'b_a_2_23_e_18', q: "How can a potometer be used to investigate the effect of environmental factors on transpiration rate?", a: "(1) Change one factor (e.g. light, wind, temp)\n(2) Measure rate of water uptake" },
                  { id: 'b_a_2_23_e_19', q: "What are limitations of using nail varnish to estimate stomata distribution?", a: "(1) Varnish may not peel cleanly\n(2) Results are only estimates" }
                ],
                "Medium (3-4 marks)": [
                  { id: 'b_a_2_23_m_1', q: "What are the main organs in the plant transport system?", a: "(1) Roots\n(2) Stems (shoots)\n(3) Leaves" },
                  { id: 'b_a_2_23_m_2', q: "How are root hair cells adapted for their function?", a: "(1) Large surface area for absorption\n(2) Large permanent vacuole to increase osmosis\n(3) Many mitochondria for active transport" },
                  { id: 'b_a_2_23_m_3', q: "What is the function of the xylem?", a: "(1) Transports water\n(2) Transports mineral ions\n(3) From roots to leaves" },
                  { id: 'b_a_2_23_m_4', q: "What is water used for in plants?", a: "(1) Photosynthesis\n(2) Maintaining turgor pressure\n(3) Transporting minerals" },
                  { id: 'b_a_2_23_m_5', q: "Describe the structure of xylem tissue.", a: "(1) Hollow tubes\n(2) No end walls\n(3) Strengthened with lignin" },
                  { id: 'b_a_2_23_m_6', q: "What causes water loss from the leaf?", a: "(1) Spongy mesophyll has air spaces\n(2) Water evaporates into air spaces\n(3) Water vapour diffuses out through stomata" },
                  { id: 'b_a_2_23_m_7', q: "What are stomata?", a: "(1) Tiny pores in leaves\n(2) Surrounded by guard cells\n(3) Allow gases to diffuse in and out" },
                  { id: 'b_a_2_23_m_8', q: "What are guard cells?", a: "(1) Cells that surround stomata\n(2) Control opening and closing\n(3) Regulate gas exchange / water loss" },
                  { id: 'b_a_2_23_m_9', q: "How are guard cells adapted for their function?", a: "(1) Thick inner walls and thin outer walls\n(2) Allows opening and closing\n(3) Sensitive to light (open in light, close in dark)" },
                  { id: 'b_a_2_23_m_10', q: "Why does a plant lose most of the water it takes in?", a: "(1) Water evaporates from mesophyll cells\n(2) Enters air spaces in the leaf\n(3) Diffuses out through stomata" },
                  { id: 'b_a_2_23_m_11', q: "Why is water loss not always harmful to the plant?", a: "(1) Maintains the transpiration stream\n(2) Pulls water up from roots\n(3) Supplies water for photosynthesis" },
                  { id: 'b_a_2_23_m_12', q: "When do stomata open and close?", a: "(1) Open to allow carbon dioxide in\n(2) Open to allow oxygen out\n(3) Close to reduce water loss" },
                  { id: 'b_a_2_23_m_13', q: "Explain how wind affects transpiration.", a: "(1) Removes water vapour from leaf surface\n(2) Maintains steep concentration gradient\n(3) Increases diffusion rate" },
                  { id: 'b_a_2_23_m_14', q: "Explain how temperature affects transpiration.", a: "(1) Increases kinetic energy of molecules\n(2) Speeds up evaporation and diffusion\n(3) Increases rate of water loss" },
                  { id: 'b_a_2_23_m_15', q: "Explain how humidity affects transpiration.", a: "(1) High humidity reduces concentration gradient\n(2) Slows diffusion of water vapour\n(3) Decreases transpiration rate" },
                  { id: 'b_a_2_23_m_16', q: "Explain how light intensity affects transpiration.", a: "(1) Light increases photosynthesis\n(2) Stomata open for gas exchange\n(3) Increases water loss" },
                  { id: 'b_a_2_23_m_17', q: "How are plants adapted to reduce water loss?", a: "(1) Waxy cuticle reduces evaporation\n(2) Stomata mainly on underside\n(3) Reduces exposure to sunlight" },
                  { id: 'b_a_2_23_m_18', q: "What happens if a plant loses water faster than it absorbs it?", a: "(1) Cells lose turgor pressure\n(2) Plant wilts\n(3) Stomata close to reduce water loss" },
                  { id: 'b_a_2_23_m_19', q: "Will the plant die if it loses too much water?", a: "(1) May stop photosynthesising\n(2) May overheat\n(3) Can recover if conditions improve" },
                  { id: 'b_a_2_23_m_20', q: "Describe the structure of phloem tissue.", a: "(1) Made of elongated living cells\n(2) Arranged in tubes\n(3) Sieve plates between cells" },
                  { id: 'b_a_2_23_m_21', q: "How does cell sap move through the phloem?", a: "(1) Moves from cell to cell\n(2) Through pores in sieve plates\n(3) Driven by pressure differences" },
                  { id: 'b_a_2_23_m_22', q: "What is sugar used for in plants?", a: "(1) Respiration\n(2) Growth (making new cells)\n(3) Storage (e.g. roots)" },
                  { id: 'b_a_2_23_m_23', q: "Why can removing a ring of bark kill a tree?", a: "(1) Phloem is found under the bark\n(2) Removing it stops sugar transport\n(3) Roots and tissues do not receive food\n(4) Tree eventually dies" }
                ],
                "Hard (5-6 marks)": [
                  { id: 'b_a_2_23_h_1', q: "How are xylem cells adapted for their function?", a: "(1) Cells are dead\n(2) No end walls → continuous tubes\n(3) Hollow to allow flow\n(4) Lignin strengthens walls\n(5) Prevents collapse under pressure\n(6) Provides support" },
                  { id: 'b_a_2_23_h_2', q: "Describe how water moves from the soil to the leaves.", a: "(1) Water enters root hair cells by osmosis\n(2) Moves through root cells by osmosis\n(3) Enters xylem vessels\n(4) Travels up the stem in transpiration stream\n(5) Moves into leaf cells\n(6) Evaporates and exits via stomata" },
                  { id: 'b_a_2_23_h_3', q: "How do guard cells work?", a: "(1) When water enters, cells become turgid\n(2) Turgid cells open the stomata\n(3) When water leaves, cells become flaccid\n(4) Flaccid cells close the stomata\n(5) Opening allows gas exchange\n(6) Closing reduces water loss" },
                  { id: 'b_a_2_23_h_4', q: "Describe the process of transpiration.", a: "(1) Water evaporates from mesophyll cells\n(2) Water vapour enters air spaces\n(3) Diffuses out through stomata\n(4) Creates a concentration gradient\n(5) Causes water to be pulled up through xylem\n(6) Forms the transpiration stream" },
                  { id: 'b_a_2_23_h_5', q: "What factors increase the rate of transpiration?", a: "(1) High temperature\n(2) Wind\n(3) Low humidity\n(4) High light intensity\n(5) Larger surface area\n(6) More stomata open" },
                  { id: 'b_a_2_23_h_6', q: "How are phloem cells adapted for their function?", a: "(1) Cells are living\n(2) Have sieve plates with pores\n(3) Few organelles to allow flow\n(4) Companion cells provide energy\n(5) Companion cells contain many mitochondria\n(6) Enables active transport of sugars" },
                  { id: 'b_a_2_23_h_7', q: "Describe how to measure transpiration using a potometer.", a: "(1) Cut shoot at slant under water\n(2) Assemble under water to avoid bubbles\n(3) Ensure system is airtight\n(4) Introduce air bubble\n(5) Measure distance moved over time\n(6) Calculate rate" },
                  { id: 'b_a_2_23_h_8', q: "Describe how to investigate stomata distribution using a microscope.", a: "(1) Apply nail varnish to leaf\n(2) Allow to dry and peel\n(3) Place on slide\n(4) Observe under microscope\n(5) Count stomata in known area\n(6) Repeat and calculate mean" }
                ]
              }

                  { id: 'b_a_f_1_11_m_5', q: "If a small animal cell is around 10 μm and a large plant cell is around 100 μm, how many orders of magnitude bigger is the plant cell?", a: "(1) 100 μm ÷ 10 μm = 10\n(2) This is 10^1\n(3) Therefore, it is 1 order of magnitude bigger" },
                  { id: 'b_a_f_1_11_m_6', q: "How many orders of magnitude bigger is a small animal cell compared to a virus?", a: "(1) Convert virus size: 100 nm = 0.1 μm\n(2) Small animal cell ≈ 10 μm\n(3) 10 ÷ 0.1 = 100\n(4) This is 10^2\n(5) Therefore, the cell is 2 orders of magnitude bigger" },
                  { id: 'b_a_f_1_11_m_7', q: "What is the purpose of the cell membrane?", a: "(1) Holds the cell together\n(2) Controls movement of substances in and out of the cell\n(3) Selectively permeable" },
                  { id: 'b_a_f_1_11_m_8', q: "What is the purpose of mitochondria?", a: "(1) Site of aerobic respiration\n(2) Releases energy (ATP)\n(3) Provides energy for cell activities" },
                  { id: 'b_a_f_1_11_m_9', q: "What are chloroplasts?", a: "(1) Contain chlorophyll\n(2) Chlorophyll absorbs light energy\n(3) Site of photosynthesis" },
                  { id: 'b_a_f_1_11_m_10', q: "What is the permanent vacuole?", a: "(1) Contains cell sap\n(2) Maintains turgor pressure\n(3) Keeps the cell rigid / supports the plant" },
                  { id: 'b_a_f_1_11_m_11', q: "Why do prokaryotic cells have plasmids?", a: "(1) Carry extra genes\n(2) Can give advantages (e.g. antibiotic resistance)\n(3) Can be transferred between cells" },
                  { id: 'b_a_f_1_11_m_12', q: "How could you use the size of cells to estimate the size of a subcellular structure?", a: "(1) Compare how many times the structure fits into the cell\n(2) Use the known size of the cell\n(3) Divide the cell size by the number of structures\n(4) This gives an approximate size of the structure" },
                  { id: 'b_a_f_1_11_m_13', q: "If a cell is 20 μm long and approximately 10 nuclei fit along its length, what is the approximate size of one nucleus?", a: "(1) Cell length = 20 μm\n(2) Number of nuclei = 10\n(3) 20 ÷ 10 = 2\n(4) Nucleus size ≈ 2 μm" },
                  { id: 'b_a_f_1_11_m_14', q: "Describe how to prepare a slide to observe onion cells.", a: "(1) Place a drop of water onto a clean slide\n(2) Peel a thin layer of onion epidermis using tweezers\n(3) Place the tissue onto the slide\n(4) Add a drop of iodine solution\n(5) Lower a cover slip carefully at an angle\n(6) Avoid trapping air bubbles" },
                  { id: 'b_a_f_1_11_m_15', q: "Describe how to draw a scientific diagram from a microscope observation.", a: "(1) Drawing should be large (at least half the space)\n(2) Use clear, continuous lines\n(3) Do not shade or colour\n(4) Keep structures in proportion\n(5) Include a title\n(6) Include magnification\n(7) Label using straight, uncrossed lines" }
                ],
                "Hard (5-6 marks)": [
                  { id: 'b_a_f_1_11_h_1', q: "Describe how to use a light microscope to observe a specimen.", a: "(1) Place the slide on the stage and secure it\n(2) Select the lowest power objective lens\n(3) Use the coarse adjustment knob to move the stage close to the lens\n(4) Look through the eyepiece\n(5) Slowly move the stage down until the image is in focus\n(6) Use the fine adjustment knob to sharpen the image\n(7) Switch to a higher magnification if needed and refocus" }
                ]
              }
            },
            "2. Organisation": {
              "2.2 Animal tissues, organs and organ systems": {
              "Easy (1-2 marks)": [
                { id: 'b_a_f_2_22_e_1', q: "What colour is blood plasma?", a: "(1) Yellow / straw-coloured" },
                { id: 'b_a_f_2_22_e_2', q: "What are platelets?", a: "(1) Small cell fragments\n(2) Help blood to clot after injury" },
                { id: 'b_a_f_2_22_e_3', q: "Where is urea formed?", a: "(1) In the liver\n(2) From the breakdown of excess amino acids / proteins" },
                { id: 'b_a_f_2_22_e_4', q: "Where is urea carried in the blood?", a: "(1) To the kidneys\n(2) Where it is removed from the blood to form urine" },
                { id: 'b_a_f_2_22_e_5', q: "Are white blood cells or red blood cells bigger?", a: "(1) White blood cells are bigger" },
                { id: 'b_a_f_2_22_e_6', q: "Are there more white blood cells or red blood cells in the body?", a: "(1) There are more red blood cells" },
                { id: 'b_a_f_2_22_e_7', q: "What are the two main types of white blood cells?", a: "(1) Lymphocytes\n(2) Phagocytes" },
                { id: 'b_a_f_2_22_e_8', q: "What do lymphocytes do?", a: "(1) Produce antibodies\n(2) Against specific pathogens" },
                { id: 'b_a_f_2_22_e_9', q: "What do phagocytes do?", a: "(1) Engulf pathogens\n(2) Digest them" },
                { id: 'b_a_f_2_22_e_10', q: "What are the three main types of blood vessels?", a: "(1) Arteries\n(2) Veins\n(3) Capillaries" },
                { id: 'b_a_f_2_22_e_11', q: "What is the smallest type of blood vessel in the circulatory system?", a: "(1) Capillaries" },
                { id: 'b_a_f_2_22_e_12', q: "How close are capillaries to body cells?", a: "(1) Usually very close to cells\n(2) Often within about 0.05 mm" },
                { id: 'b_a_f_2_22_e_13', q: "What is the function of arteries?", a: "(1) Carry blood away from the heart\n(2) Carry blood to organs / tissues" },
                { id: 'b_a_f_2_22_e_14', q: "What colour is blood in most arteries?", a: "(1) Bright red\n(2) Because it is usually oxygenated" },
                { id: 'b_a_f_2_22_e_15', q: "When you feel your pulse, what are you feeling?", a: "(1) Pressure waves in the arteries\n(2) Caused by the heart pumping blood" },
                { id: 'b_a_f_2_22_e_16', q: "What is the function of veins?", a: "(1) Carry blood towards the heart\n(2) From organs / tissues" },
                { id: 'b_a_f_2_22_e_17', q: "Do veins have thick walls?", a: "(1) No\n(2) Veins have thinner walls than arteries" },
                { id: 'b_a_f_2_22_e_18', q: "Do veins have a pulse?", a: "(1) No\n(2) Blood pressure in veins is low" },
                { id: 'b_a_f_2_22_e_19', q: "What colour is blood in most veins?", a: "(1) Dark red\n(2) Because it has less oxygen" },
                { id: 'b_a_f_2_22_e_20', q: "What is a lumen?", a: "(1) The hollow space inside a blood vessel" },
                { id: 'b_a_f_2_22_e_21', q: "What is pulmonary circulation?", a: "(1) Circulation between the heart and lungs" },
                { id: 'b_a_f_2_22_e_22', q: "What is systemic circulation?", a: "(1) Circulation between the heart and the rest of the body" },
                { id: 'b_a_f_2_22_e_23', q: "What is the function of the coronary arteries?", a: "(1) Supply oxygenated blood to the heart muscle\n(2) So the heart muscle can respire" },
                { id: 'b_a_f_2_22_e_24', q: "How many chambers are in the heart?", a: "(1) Four" },
                { id: 'b_a_f_2_22_e_25', q: "When one side of the heart fills with blood, is there blood on the other side too?", a: "(1) Yes\n(2) Both sides of the heart fill and empty at the same time" },
                { id: 'b_a_f_2_22_e_26', q: "How does blood move from the atria to the ventricles?", a: "(1) The atria contract\n(2) This forces blood into the ventricles" },
                { id: 'b_a_f_2_22_e_27', q: "What are you hearing when you listen to a heartbeat with a stethoscope?", a: "(1) Valves closing" },
                { id: 'b_a_f_2_22_e_28', q: "Which side of the heart has thicker muscle walls?", a: "(1) The left side\n(2) Because it pumps blood around the whole body" },
                { id: 'b_a_f_2_22_e_29', q: "Do you need a general anaesthetic to insert a stent?", a: "(1) No" },
                { id: 'b_a_f_2_22_e_30', q: "Can stents be used in arteries other than coronary arteries?", a: "(1) Yes" },
                { id: 'b_a_f_2_22_e_31', q: "What vessel carries blood from the body tissues back to the heart?", a: "(1) Vena cava" },
                { id: 'b_a_f_2_22_e_32', q: "Which chamber does blood enter after returning from the body in the vena cava?", a: "(1) Right atrium" },
                { id: 'b_a_f_2_22_e_33', q: "Which chamber pumps blood to the lungs?", a: "(1) Right ventricle" },
                { id: 'b_a_f_2_22_e_34', q: "Which blood vessel carries blood from the heart to the lungs?", a: "(1) Pulmonary artery" },
                { id: 'b_a_f_2_22_e_35', q: "Which blood vessel carries blood from the lungs back to the heart?", a: "(1) Pulmonary vein" },
                { id: 'b_a_f_2_22_e_36', q: "Which chamber receives blood from the lungs?", a: "(1) Left atrium" },
                { id: 'b_a_f_2_22_e_37', q: "Which chamber pumps blood to the body?", a: "(1) Left ventricle" },
                { id: 'b_a_f_2_22_e_38', q: "Which blood vessel carries blood from the heart to the body?", a: "(1) Aorta" },
                { id: 'b_a_f_2_22_e_39', q: "What is a leaky heart valve?", a: "(1) A heart valve that does not close properly\n(2) Blood can leak backwards" },
                { id: 'b_a_f_2_22_e_40', q: "Why are faulty heart valves a problem?", a: "(1) They reduce the efficiency of the heart\n(2) They can cause breathlessness" },
                { id: 'b_a_f_2_22_e_41', q: "How can faulty heart valves be treated?", a: "(1) They can be replaced with mechanical valves\n(2) Or biological valves" },
                { id: 'b_a_f_2_22_e_42', q: "What are mechanical heart valves made from?", a: "(1) Man-made materials\n(2) Such as titanium or polymers" },
                { id: 'b_a_f_2_22_e_43', q: "What are biological heart valves made from?", a: "(1) Animal tissue\n(2) Or human tissue" },
                { id: 'b_a_f_2_22_e_44', q: "What is the heart’s natural pacemaker?", a: "(1) A group of cells in the right atrium\n(2) Controls resting heart rate" },
                { id: 'b_a_f_2_22_e_45', q: "What is an artificial pacemaker?", a: "(1) An electrical device implanted in the chest\n(2) Corrects irregular heart rhythms" },
                { id: 'b_a_f_2_22_e_46', q: "What is a heart transplant?", a: "(1) Replacing a failing heart\n(2) With a donor heart" },
                { id: 'b_a_f_2_22_e_47', q: "What is an artificial heart?", a: "(1) A man-made pump\n(2) Used to replace or support a failing heart" }
              ],
              "Medium (3-4 marks)": [
                { id: 'b_a_f_2_22_m_1', q: "What is blood?", a: "(1) A tissue made of plasma\n(2) Contains red blood cells\n(3) Contains white blood cells and platelets\n(4) Transports substances around the body" },
                { id: 'b_a_f_2_22_m_2', q: "What is blood plasma?", a: "(1) The liquid part of blood\n(2) Carries blood cells\n(3) Transports dissolved substances\n(4) Makes up about 55% of blood" },
                { id: 'b_a_f_2_22_m_3', q: "What substances are transported in blood plasma?", a: "(1) Carbon dioxide\n(2) Urea\n(3) Digested food molecules / glucose\n(4) Hormones" },
                { id: 'b_a_f_2_22_m_4', q: "How are red blood cells adapted for their function?", a: "(1) No nucleus, giving more space for haemoglobin\n(2) Biconcave disc shape gives a large surface area\n(3) Haemoglobin binds to oxygen\n(4) Thin shape gives a short diffusion distance" },
                { id: 'b_a_f_2_22_m_5', q: "Compare red blood cells and white blood cells.", a: "(1) Red blood cells transport oxygen\n(2) White blood cells defend against pathogens\n(3) Red blood cells have no nucleus\n(4) White blood cells have a nucleus" },
                { id: 'b_a_f_2_22_m_6', q: "How are arteries adapted for their function?", a: "(1) Thick walls to withstand high blood pressure\n(2) Muscle layer helps control blood flow\n(3) Elastic fibres stretch and recoil\n(4) Small lumen helps maintain high pressure" },
                { id: 'b_a_f_2_22_m_7', q: "How are veins adapted for their function?", a: "(1) Valves prevent backflow of blood\n(2) Large lumen reduces resistance to blood flow\n(3) Thin walls because blood pressure is low\n(4) Blood is helped back to the heart by surrounding muscle contractions" },
                { id: 'b_a_f_2_22_m_8', q: "How do valves in veins work?", a: "(1) Blood flows towards the heart\n(2) If blood starts to flow backwards, valves close\n(3) This prevents backflow\n(4) Muscle contractions help push blood forwards" },
                { id: 'b_a_f_2_22_m_9', q: "What are capillaries?", a: "(1) Tiny blood vessels\n(2) Form networks around body tissues\n(3) Link arteries and veins\n(4) Allow exchange of substances with cells" },
                { id: 'b_a_f_2_22_m_10', q: "How are capillaries adapted for exchange?", a: "(1) Walls are one cell thick\n(2) This gives a short diffusion distance\n(3) Walls are permeable\n(4) They form large networks, giving a large surface area" },
                { id: 'b_a_f_2_22_m_11', q: "Describe the human circulatory system.", a: "(1) Humans have a double circulatory system\n(2) One circuit carries blood between the heart and lungs\n(3) One circuit carries blood between the heart and the rest of the body\n(4) Blood passes through the heart twice for each full circuit of the body" },
                { id: 'b_a_f_2_22_m_12', q: "What is the difference between pulmonary circulation and systemic circulation?", a: "(1) Pulmonary circulation carries blood between the heart and lungs\n(2) Systemic circulation carries blood between the heart and the rest of the body\n(3) Pulmonary circulation oxygenates blood\n(4) Systemic circulation delivers oxygenated blood to body cells" },
                { id: 'b_a_f_2_22_m_13', q: "Describe the structure of an artery in detail.", a: "(1) Thick walls\n(2) Small lumen\n(3) Thick layer of muscle\n(4) Elastic fibres in the wall" },
                { id: 'b_a_f_2_22_m_14', q: "Describe the structure of a vein in detail.", a: "(1) Large lumen\n(2) Relatively thin walls\n(3) Often contain valves" },
                { id: 'b_a_f_2_22_m_15', q: "Describe the structure of a capillary in detail.", a: "(1) Very small / tiny blood vessel\n(2) Narrow lumen\n(3) Wall is one cell thick" },
                { id: 'b_a_f_2_22_m_16', q: "When do the valves in the heart close?", a: "(1) Valves close when blood tries to flow backwards\n(2) This prevents backflow\n(3) Valves close after blood has moved through the heart\n(4) The closing of valves produces the heartbeat sound" },
                { id: 'b_a_f_2_22_m_17', q: "Why is the left side of the heart thicker than the right side?", a: "(1) The left side pumps blood around the whole body\n(2) This requires higher pressure\n(3) The right side only pumps blood to the lungs\n(4) So the right side does not need such thick muscle" },
                { id: 'b_a_f_2_22_m_18', q: "Why would it be harmful if the right side of the heart pumped at very high pressure?", a: "(1) The right side pumps blood to the lungs\n(2) Lung capillaries are delicate\n(3) High pressure could damage them\n(4) This would reduce gas exchange efficiency" },
                { id: 'b_a_f_2_22_m_19', q: "What happens to the coronary arteries in coronary heart disease?", a: "(1) Fatty material builds up in the artery wall\n(2) The coronary arteries become narrower\n(3) Blood flow to the heart muscle is reduced" },
                { id: 'b_a_f_2_22_m_20', q: "Why is coronary heart disease dangerous?", a: "(1) Less blood reaches the heart muscle\n(2) Less oxygen is supplied to heart muscle cells\n(3) Heart muscle cells respire less efficiently\n(4) This can cause chest pain, heart attack or death" },
                { id: 'b_a_f_2_22_m_21', q: "How do statins help reduce the risk of coronary heart disease?", a: "(1) Statins lower blood cholesterol levels\n(2) This slows fatty material being deposited in arteries\n(3) This reduces narrowing of the arteries\n(4) This lowers the risk of heart attack" },
                { id: 'b_a_f_2_22_m_22', q: "Describe the route of blood from the body tissues to the lungs.", a: "(1) Body tissues → vena cava\n(2) Vena cava → right atrium\n(3) Right atrium → right ventricle\n(4) Right ventricle → pulmonary artery → lungs" },
                { id: 'b_a_f_2_22_m_23', q: "Describe the route of blood from the lungs to the body tissues.", a: "(1) Lungs → pulmonary vein\n(2) Pulmonary vein → left atrium\n(3) Left atrium → left ventricle\n(4) Left ventricle → aorta → body tissues" },
                { id: 'b_a_f_2_22_m_24', q: "What are the advantages and disadvantages of mechanical heart valves?", a: "(1) Last a long time\n(2) Very durable\n(3) May increase risk of blood clots\n(4) Patient may need lifelong blood-thinning medication" },
                { id: 'b_a_f_2_22_m_25', q: "What are the advantages and disadvantages of biological heart valves?", a: "(1) Less risk of blood clotting than mechanical valves\n(2) Usually do not require lifelong blood thinners\n(3) Do not last as long\n(4) May need replacing after around 12–15 years" },
                { id: 'b_a_f_2_22_m_26', q: "Why is an irregular heart rhythm a problem?", a: "(1) If too slow, not enough oxygen is delivered\n(2) If too fast, the heart may not fill properly\n(3) Less blood is pumped around the body\n(4) Cells may not get enough oxygen for respiration" },
                { id: 'b_a_f_2_22_m_27', q: "How do artificial pacemakers work?", a: "(1) Wires connect the pacemaker to the heart\n(2) The pacemaker sends electrical impulses\n(3) These impulses stimulate the heart to contract\n(4) This helps restore a regular heartbeat" },
                { id: 'b_a_f_2_22_m_28', q: "What are disadvantages of artificial pacemakers?", a: "(1) Need regular check-ups\n(2) Battery may need replacing\n(3) There is a small risk of infection" },
                { id: 'b_a_f_2_22_m_29', q: "How can severe heart failure be treated?", a: "(1) Heart transplant\n(2) Artificial heart\n(3) Artificial heart can be used while waiting for transplant\n(4) Artificial heart can allow the heart to rest and recover" }
              ],
              "Hard (5-6 marks)": [
                { id: 'b_a_f_2_22_h_1', q: "Describe how platelets help blood to clot after a wound.", a: "(1) Platelets collect at the wound\n(2) Enzymes convert fibrinogen into fibrin\n(3) Fibrin forms a network of protein fibres\n(4) Red blood cells and platelets get trapped in the fibres\n(5) A clot forms to stop blood loss\n(6) The clot dries into a scab" },
                { id: 'b_a_f_2_22_h_2', q: "Explain why blood clotting is important after injury.", a: "(1) Prevents excessive blood loss\n(2) Forms a clot over the wound\n(3) Clot dries into a scab\n(4) Scab protects new skin as it grows\n(5) Reduces entry of pathogens\n(6) Helps prevent infection" },
                { id: 'b_a_f_2_22_h_3', q: "Describe the composition of blood and the function of each component.", a: "(1) Plasma transports dissolved substances\n(2) Red blood cells transport oxygen\n(3) White blood cells defend against pathogens\n(4) Platelets help blood clot\n(5) Plasma makes up about 55% of blood\n(6) Red blood cells make up about 45% of blood" },
                { id: 'b_a_f_2_22_h_4', q: "Explain how urea is produced and removed from the body.", a: "(1) Excess proteins are broken down into amino acids\n(2) Excess amino acids cannot be stored\n(3) They are broken down in the liver\n(4) Urea is produced as a waste product\n(5) Urea is carried in blood plasma to the kidneys\n(6) Kidneys remove urea from the blood to form urine" },
                { id: 'b_a_f_2_22_h_5', q: "Compare arteries, veins and capillaries.", a: "(1) Arteries carry blood away from the heart\n(2) Veins carry blood towards the heart\n(3) Capillaries connect arteries and veins\n(4) Arteries have thick elastic walls to withstand high pressure\n(5) Veins have valves to prevent backflow\n(6) Capillaries have one-cell-thick walls for diffusion" },
                { id: 'b_a_f_2_22_h_6', q: "Explain how the structure of capillaries helps substances move between blood and body cells.", a: "(1) Capillaries form networks close to body cells\n(2) This gives a short diffusion distance\n(3) Walls are one cell thick\n(4) This allows rapid diffusion\n(5) Walls are permeable, so substances can pass through\n(6) Large surface area allows efficient exchange" },
                { id: 'b_a_f_2_22_h_7', q: "Explain why humans have a double circulatory system.", a: "(1) Blood travels from the heart to the lungs\n(2) Blood picks up oxygen in the lungs\n(3) Blood returns to the heart\n(4) The heart pumps oxygenated blood to the body at high pressure\n(5) This allows rapid delivery of oxygen and glucose to cells\n(6) This supports a high rate of respiration" },
                { id: 'b_a_f_2_22_h_8', q: "Explain how arteries are adapted to carry blood at high pressure.", a: "(1) Arteries carry blood directly from the heart\n(2) Blood is under high pressure\n(3) Thick walls prevent bursting\n(4) Elastic fibres stretch when blood surges through\n(5) Elastic fibres recoil to maintain pressure\n(6) Muscle layer helps control blood flow" },
                { id: 'b_a_f_2_22_h_9', q: "Compare the structures of arteries, veins and capillaries.", a: "(1) Arteries have thick walls\n(2) Arteries have a small lumen\n(3) Arteries contain thick muscle and elastic fibres\n(4) Veins have thin walls and large lumens\n(5) Veins often have valves\n(6) Capillaries are tiny vessels with walls one cell thick" },
                { id: 'b_a_f_2_22_h_10', q: "Explain how a stent is used to treat coronary heart disease.", a: "(1) A stent is a small metal mesh tube\n(2) It is inserted into a narrowed coronary artery\n(3) A tiny balloon expands the stent\n(4) This widens the artery\n(5) The stent stays in place after the balloon is removed\n(6) This improves blood flow to the heart muscle" },
                { id: 'b_a_f_2_22_h_11', q: "Explain how coronary heart disease can lead to a heart attack.", a: "(1) Fatty material builds up in coronary arteries\n(2) The arteries become narrowed\n(3) Less blood reaches the heart muscle\n(4) Less oxygen reaches heart muscle cells\n(5) Heart muscle cells cannot respire enough\n(6) Heart muscle cells may die, causing a heart attack" },
                { id: 'b_a_f_2_22_h_12', q: "Compare stents, statins and bypass surgery as treatments for coronary heart disease.", a: "(1) Stents widen narrowed arteries to improve blood flow\n(2) Stents act quickly and do not usually need general anaesthetic\n(3) Statins lower cholesterol and slow further fatty deposits\n(4) Statins are long-term medication\n(5) Bypass surgery replaces or bypasses blocked arteries using blood vessels from elsewhere\n(6) Bypass surgery is more invasive and usually used when other treatments are unsuitable" },
                { id: 'b_a_f_2_22_h_13', q: "Describe how bypass surgery can treat coronary heart disease.", a: "(1) A blood vessel is taken from another part of the body\n(2) It is attached around the blocked or narrowed coronary artery\n(3) This creates a new route for blood flow\n(4) More blood reaches the heart muscle\n(5) More oxygen reaches heart muscle cells\n(6) This reduces the risk of heart attack" },
                { id: 'b_a_f_2_22_h_14', q: "Describe the full route of blood through the double circulatory system.", a: "(1) Blood from the body enters the heart through the vena cava\n(2) It enters the right atrium, then the right ventricle\n(3) The right ventricle pumps blood through the pulmonary artery to the lungs\n(4) Blood returns from the lungs through the pulmonary vein to the left atrium\n(5) It moves into the left ventricle\n(6) The left ventricle pumps blood through the aorta to the body tissues" },
                { id: 'b_a_f_2_22_h_15', q: "Explain why the human circulatory system is described as a double circulatory system.", a: "(1) Blood passes through the heart twice in one full circuit\n(2) One circuit carries blood between the heart and lungs\n(3) This is the pulmonary circulation\n(4) One circuit carries blood between the heart and the rest of the body\n(5) This is the systemic circulation\n(6) This allows oxygenated blood to be pumped around the body at high pressure" },
                { id: 'b_a_f_2_22_h_16', q: "Compare mechanical and biological heart valves.", a: "(1) Mechanical valves are made from man-made materials\n(2) Mechanical valves last a long time\n(3) Mechanical valves increase risk of blood clots\n(4) Patients may need lifelong blood-thinning medication\n(5) Biological valves are made from animal or human tissue\n(6) Biological valves may need replacing after 12–15 years" },
                { id: 'b_a_f_2_22_h_17', q: "Explain how faulty heart valves can affect the body.", a: "(1) Valves may not close properly\n(2) Blood can leak backwards\n(3) Or valves may become stiff and not open fully\n(4) Less blood is pumped around the body\n(5) Less oxygen reaches body cells\n(6) This can cause breathlessness or serious illness" },
                { id: 'b_a_f_2_22_h_18', q: "Compare heart transplants and artificial hearts.", a: "(1) A heart transplant uses a donor heart\n(2) Donor hearts are not always available\n(3) Donor heart must be a tissue match\n(4) Artificial hearts can keep a patient alive while waiting for a transplant\n(5) Artificial hearts are expensive\n(6) Artificial hearts increase risk of blood clots" },
                { id: 'b_a_f_2_22_h_19', q: "Explain how an artificial pacemaker helps treat an irregular heartbeat.", a: "(1) An irregular rhythm can make the heart pump inefficiently\n(2) This reduces oxygen delivery to cells\n(3) The pacemaker is implanted in the chest\n(4) Wires connect it to the heart\n(5) It sends electrical impulses to the heart muscle\n(6) These impulses stimulate regular contractions" }
              ]
            },

                  { id: 'b_a_f_2_23_m_14', q: "Explain how temperature affects transpiration.", a: "(1) Increases kinetic energy of molecules\n(2) Speeds up evaporation and diffusion\n(3) Increases rate of water loss" },

                  { id: 'b_a_f_2_23_h_1', q: "How are xylem cells adapted for their function?", a: "(1) Cells are dead\n(2) No end walls → continuous tubes\n(3) Hollow to allow flow\n(4) Lignin strengthens walls\n(5) Prevents collapse under pressure\n(6) Provides support" },
                  { id: 'b_a_f_2_23_h_2', q: "Describe how water moves from the soil to the leaves.", a: "(1) Water enters root hair cells by osmosis\n(2) Moves through root cells by osmosis\n(3) Enters xylem vessels\n(4) Travels up the stem in transpiration stream\n(5) Moves into leaf cells\n(6) Evaporates and exits via stomata" },
                  { id: 'b_a_f_2_23_h_3', q: "How do guard cells work?", a: "(1) When water enters, cells become turgid\n(2) Turgid cells open the stomata\n(3) When water leaves, cells become flaccid\n(4) Flaccid cells close the stomata\n(5) Opening allows gas exchange\n(6) Closing reduces water loss" },
                  { id: 'b_a_f_2_23_h_4', q: "Describe the process of transpiration.", a: "(1) Water evaporates from mesophyll cells\n(2) Water vapour enters air spaces\n(3) Diffuses out through stomata\n(4) Creates a concentration gradient\n(5) Causes water to be pulled up through xylem\n(6) Forms the transpiration stream" },
                  { id: 'b_a_f_2_23_h_5', q: "What factors increase the rate of transpiration?", a: "(1) High temperature\n(2) Wind\n(3) Low humidity\n(4) High light intensity\n(5) Larger surface area\n(6) More stomata open" },
                  { id: 'b_a_f_2_23_h_6', q: "How are phloem cells adapted for their function?", a: "(1) Cells are living\n(2) Have sieve plates with pores\n(3) Few organelles to allow flow\n(4) Companion cells provide energy\n(5) Companion cells contain many mitochondria\n(6) Enables active transport of sugars" },

                ]

    const ChevronLeft = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m15 18-6-6 6-6"/></svg>;

    function App() {
      const [step, setStep] = useState('menu');
      const [path, setPath] = useState([]);
      const [queue, setQueue] = useState([]);
      const [currentIndex, setCurrentIndex] = useState(0);
      const [showAnswer, setShowAnswer] = useState(false);
      const [sessionXP, setSessionXP] = useState(0);
      const [sessionStats, setSessionStats] = useState({ weak: 0, medium: 0, strong: 0 });
      const [totalXP, setTotalXP] = useState(parseInt(localStorage.getItem('studyqs_xp') || '0'));

      const startSession = (selectedPath) => {
        const [subj, board, tier, top, sub, diff] = selectedPath;
        const allQuestions = DATABASE[subj]?.[board]?.[tier]?.[top]?.[sub]?.[diff] || [];
        const scores = JSON.parse(localStorage.getItem('studyqs_scores') || '{}');

        let weak = [], medium = [], unseen = [], strong = [];
        
        // Sort questions into priority buckets
        allQuestions.forEach(q => {
          const score = scores[q.id];
          if (score === 1) weak.push(q);
          else if (score === 2) medium.push(q);
          else if (score === 3) strong.push(q);
          else unseen.push(q);
        });

        const shuffle = (arr) => arr.sort(() => Math.random() - 0.5);
        
        // Build the queue: Weak -> Medium -> Unseen
        let buildQueue = [...shuffle(weak), ...shuffle(medium), ...shuffle(unseen)];
        
        // If they have mastered everything, give them a recap of their strong cards
        if (buildQueue.length === 0 && strong.length > 0) {
          buildQueue = shuffle(strong);
        }

        if (buildQueue.length === 0) {
          alert("No questions found in this section.");
          return;
        }

        setQueue(buildQueue);
        setCurrentIndex(0);
        setSessionXP(0);
        setSessionStats({ weak: 0, medium: 0, strong: 0 });
        setPath(selectedPath);
        setStep('playing');
      };

      const handleSelect = (val) => {
        const newPath = [...path, val];
        if (newPath.length === 6) {
          startSession(newPath);
        } else {
          setPath(newPath);
        }
      };

      const handleRate = (rating) => {
        const currentQ = queue[currentIndex];
        const scores = JSON.parse(localStorage.getItem('studyqs_scores') || '{}');
        scores[currentQ.id] = rating;
        localStorage.setItem('studyqs_scores', JSON.stringify(scores));

        // Award XP
        const newTotal = totalXP + 10;
        setTotalXP(newTotal);
        setSessionXP(prev => prev + 10);
        localStorage.setItem('studyqs_xp', newTotal.toString());

        // Update Session Stats Breakdown
        setSessionStats(prev => ({
          ...prev,
          weak: rating === 1 ? prev.weak + 1 : prev.weak,
          medium: rating === 2 ? prev.medium + 1 : prev.medium,
          strong: rating === 3 ? prev.strong + 1 : prev.strong
        }));

        if (currentIndex + 1 < queue.length) {
          setCurrentIndex(prev => prev + 1);
          setShowAnswer(false);
        } else {
          setStep('summary');
        }
      };

      const getStats = () => {
        const scores = JSON.parse(localStorage.getItem('studyqs_scores') || '{}');
        const stats = {};
        Object.keys(DATABASE).forEach(subj => {
          let total = 0, mastered = 0, seen = 0;
          const traverse = (obj) => {
            if (Array.isArray(obj)) {
              obj.forEach(q => {
                total++;
                if (scores[q.id]) seen++;
                if (scores[q.id] === 3) mastered++;
              });
            } else {
              Object.values(obj).forEach(val => traverse(val));
            }
          };
          traverse(DATABASE[subj]);
          stats[subj] = { total, mastered, seen, pct: total > 0 ? Math.round((mastered / total) * 100) : 0 };
        });
        return stats;
      };

      const getTopicStats = () => {
        if (path.length !== 3) return null;
        const [subj, board, tier] = path;
        const topics = DATABASE[subj]?.[board]?.[tier] || {};
        const scores = JSON.parse(localStorage.getItem('studyqs_scores') || '{}');
        const stats = {};

        Object.keys(topics).forEach(topic => {
          let total = 0, mastered = 0, seen = 0;
          const subtopics = topics[topic];
          Object.values(subtopics).forEach(difficulties => {
            Object.values(difficulties).forEach(questions => {
              total += questions.length;
              questions.forEach(q => {
                if (scores[q.id]) seen++;
                if (scores[q.id] === 3) mastered++;
              });
            });
          });
          stats[topic] = { total, mastered, seen, pct: total > 0 ? Math.round((mastered / total) * 100) : 0 };
        });
        return stats;
      };

      // Handle Spacebar and Keypresses
      useEffect(() => {
        const handleKeyDown = (e) => {
          if (step !== 'playing') return;
          if (e.code === 'Space') { 
            e.preventDefault(); 
            if (!showAnswer) setShowAnswer(true); 
          }
          if (showAnswer) {
            if (e.key === '1') handleRate(1);
            if (e.key === '2') handleRate(2);
            if (e.key === '3') handleRate(3);
          }
        };
        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, [step, showAnswer, handleRate]);


      if (step === 'menu') {
        let options = [], title = "";
        if (path.length === 0) { title = "Select Subject"; options = Object.keys(DATABASE); }
        else if (path.length === 1) { title = "Select Exam Board"; options = Object.keys(DATABASE[path[0]]); }
        else if (path.length === 2) { title = "Select Tier"; options = Object.keys(DATABASE[path[0]][path[1]]); }
        else if (path.length === 3) { title = "Select Topic"; options = Object.keys(DATABASE[path[0]][path[1]][path[2]]); }
        else if (path.length === 4) { title = "Select Subtopic"; options = Object.keys(DATABASE[path[0]][path[1]][path[2]][path[3]]); }
        else if (path.length === 5) { title = "Select Difficulty"; options = Object.keys(DATABASE[path[0]][path[1]][path[2]][path[3]][path[4]]); }

        const stats = path.length === 0 ? getStats() : null;
        const topicStats = path.length === 3 ? getTopicStats() : null;

        return (
          <div className="w-full max-w-2xl mx-auto p-6 animate-fade-in">
            <div className="flex flex-col sm:flex-row justify-between items-start gap-4 mb-10">
              <div className="text-left">
                <h1 className="text-4xl font-bold text-gray-900 tracking-tight">studyqs</h1>
                <p className="text-xl text-gray-500 mt-2">Recall questions for GCSE</p>
                <p className="text-xs text-gray-400 mt-2 uppercase tracking-wider font-semibold">(DATA IS AUTOSAVED PER DEVICE)</p>
              </div>
              <div className="flex gap-3">
                <div className="bg-[#FEF9C3] px-4 py-3 rounded-xl text-center min-w-[100px] shadow-sm">
                  <div className="text-xs font-bold text-yellow-700 uppercase mb-1">Total XP</div>
                  <div className="text-2xl font-bold text-yellow-900">{totalXP}</div>
                </div>
              </div>
            </div>

            {path.length > 0 && (
              <div className="flex items-center gap-2 mb-6 text-sm text-gray-600 bg-white p-3 rounded-lg border border-gray-200 shadow-sm">
                <button onClick={() => setPath(path.slice(0, -1))} className="hover:text-blue-600 flex items-center font-medium transition-colors">
                  <ChevronLeft className="w-4 h-4 mr-1" /> Back
                </button>
                <span className="text-gray-300">|</span>
                <span className="truncate font-medium">{path.join(' > ')}</span>
              </div>
            )}

            {/* Level 0: Interactive Subject Cards (NO STATS AS REQUESTED) */}
            {path.length === 0 && (
              <div className="mb-10">
                <h3 className="text-sm font-bold text-gray-400 uppercase tracking-wider mb-4 px-1">Select Subject</h3>
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                  {Object.keys(DATABASE).map((subj) => (
                    <button key={subj} onClick={() => handleSelect(subj)} className="bg-white border border-gray-200 rounded-lg p-5 shadow-sm text-left hover:border-blue-500 hover:shadow-md transition-all group block w-full">
                      <div className="flex justify-between items-center">
                        <span className="text-lg font-bold text-gray-800 group-hover:text-blue-700 transition-colors">{subj}</span>
                      </div>
                    </button>
                  ))}
                </div>
              </div>
            )}

            {/* Level 3: Interactive Topic Cards */}
            {path.length === 3 && (
              <div className="mb-10">
                <h3 className="text-sm font-bold text-gray-400 uppercase tracking-wider mb-4 px-1">Select Topic</h3>
                <div className="grid grid-cols-1 gap-4">
                  {Object.entries(topicStats).map(([topic, s]) => (
                    <button key={topic} onClick={() => handleSelect(topic)} className="bg-white border border-gray-200 rounded-lg p-5 shadow-sm text-left hover:border-blue-500 hover:shadow-md transition-all group block w-full">
                      <div className="flex justify-between items-center mb-4">
                        <span className="text-lg font-bold text-gray-800 truncate mr-2 group-hover:text-blue-700 transition-colors" title={topic}>{topic}</span>
                        <span className="text-sm font-bold text-blue-600 whitespace-nowrap">{s.pct}% mastered</span>
                      </div>
                      <div className="w-full bg-gray-100 rounded-full h-2 mb-3 overflow-hidden">
                        <div className="bg-blue-500 h-2 rounded-full transition-all duration-1000" style={{ width: `${s.pct}%` }} />
                      </div>
                      <div className="text-xs text-gray-400 font-medium">{s.seen} of {s.total} cards seen</div>
                    </button>
                  ))}
                </div>
              </div>
            )}

            {/* Standard buttons for paths that are NOT Subjects or Topics */}
            {(path.length !== 0 && path.length !== 3) && (
              <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
                <h2 className="text-2xl font-bold text-gray-800 mb-6">{title}</h2>
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                  {options.map(opt => (
                    <button key={opt} onClick={() => handleSelect(opt)} className="p-4 text-left border border-gray-200 rounded-lg hover:border-blue-500 hover:bg-blue-50 hover:text-blue-700 transition-all font-medium text-gray-700 group flex justify-between items-center">
                      <span className="text-lg">{opt}</span>
                    </button>
                  ))}
                </div>
              </div>
            )}
          </div>
        );
      }

      if (step === 'playing') {
        const q = queue[currentIndex];
        const progress = ((currentIndex + 1) / queue.length) * 100;
        return (
          <div className="w-full max-w-3xl mx-auto p-4 md:p-8 animate-fade-in flex flex-col min-h-screen justify-center">
            <div className="flex justify-between items-center mb-4">
              <button onClick={() => setStep('summary')} className="text-gray-500 hover:text-gray-800 flex items-center gap-2 text-sm font-medium transition-colors">
                <RotateCcw className="w-4 h-4" /> Exit Session
              </button>
              <div className="bg-[#FEF9C3] px-3 py-1 rounded-lg text-yellow-800 text-xs font-bold shadow-sm">
                Session XP: {sessionXP}
              </div>
            </div>
            <div className="w-full bg-gray-200 rounded-full h-2.5 mb-2">
              <div className="bg-blue-600 h-2.5 rounded-full transition-all duration-300" style={{ width: `${progress}%` }} />
            </div>
            <div className="text-right text-xs text-gray-500 font-medium mb-8">Card {currentIndex + 1} of {queue.length}</div>
            
            <div className="bg-white rounded-2xl shadow-lg border border-gray-200 flex flex-col overflow-hidden min-h-[350px]">
              <div className="p-8 md:p-12 flex-1 flex items-center justify-center text-center">
                <h2 className="text-2xl md:text-3xl font-semibold text-gray-800 leading-relaxed">
                  {q.q}
                </h2>
              </div>
              
              {!showAnswer ? (
                <div className="p-6 bg-gray-50 border-t border-gray-200 text-center">
                  <button onClick={() => setShowAnswer(true)} className="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-8 rounded-lg shadow-sm transition-all w-full md:w-auto">
                    Show Answer (Space)
                  </button>
                </div>
              ) : (
                <div className="p-8 md:p-10 bg-blue-50 border-t border-blue-200 text-center animate-fade-in">
                  <p className="text-lg md:text-xl text-blue-900 mb-8 font-medium whitespace-pre-wrap leading-relaxed">
                    {q.a}
                  </p>
                  <p className="text-sm text-gray-500 mb-4 font-medium uppercase tracking-wider">How was it?</p>
                  <div className="grid grid-cols-3 gap-4 max-w-sm mx-auto">
                    <button onClick={() => handleRate(1)} className="p-4 bg-white border border-red-200 hover:border-red-400 hover:bg-red-50 rounded-xl transition-all shadow-sm group">
                      <span className="text-3xl block mb-2 group-hover:scale-110 transition-transform">🙁</span>
                      <div className="text-sm font-bold text-red-600">Bad</div>
                    </button>
                    <button onClick={() => handleRate(2)} className="p-4 bg-white border border-yellow-200 hover:border-yellow-400 hover:bg-yellow-50 rounded-xl transition-all shadow-sm group">
                      <span className="text-3xl block mb-2 group-hover:scale-110 transition-transform">😐</span>
                      <div className="text-sm font-bold text-yellow-600">Ish</div>
                    </button>
                    <button onClick={() => handleRate(3)} className="p-4 bg-white border border-green-200 hover:border-green-400 hover:bg-green-50 rounded-xl transition-all shadow-sm group">
                      <span className="text-3xl block mb-2 group-hover:scale-110 transition-transform">🙂</span>
                      <div className="text-sm font-bold text-green-600">Easy</div>
                    </button>
                  </div>
                </div>
              )}
            </div>
          </div>
        );
      }

      if (step === 'summary') {
        // Find exactly how many cards were answered in this specific session
        const totalAnswered = sessionStats.weak + sessionStats.medium + sessionStats.strong;

        return (
          <div className="w-full max-w-xl mx-auto p-6 text-center animate-fade-in mt-12 min-h-screen flex flex-col justify-center">
            <div className="mb-6 flex justify-center text-yellow-500">
              <Trophy className="w-16 h-16" />
            </div>
            <h1 className="text-3xl font-bold text-gray-800 mb-2">Session Complete!</h1>
            <p className="text-blue-600 font-bold text-lg mb-8">+{sessionXP} XP Earned</p>
            
            <div className="bg-white p-6 rounded-2xl border border-gray-200 shadow-sm mb-8 max-w-md mx-auto w-full">
              <div className="flex justify-between items-center text-center divide-x divide-gray-100">
                <div className="flex-1">
                  <div className="text-3xl font-bold text-gray-800">{totalAnswered}</div>
                  <div className="text-[10px] uppercase font-semibold text-gray-400 mt-1">Cards Done</div>
                </div>
                <div className="flex-1">
                  <span className="text-2xl block mb-1">🙁</span>
                  <div className="text-xl font-bold text-gray-800">{sessionStats.weak}</div>
                </div>
                <div className="flex-1">
                  <span className="text-2xl block mb-1">😐</span>
                  <div className="text-xl font-bold text-gray-800">{sessionStats.medium}</div>
                </div>
                <div className="flex-1">
                  <span className="text-2xl block mb-1">🙂</span>
                  <div className="text-xl font-bold text-gray-800">{sessionStats.strong}</div>
                </div>
              </div>
            </div>
            
            <div className="flex flex-col sm:flex-row gap-4 justify-center">
              <button onClick={() => startSession(path)} className="px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg shadow-sm transition-all">Practice Again</button>
              <button onClick={() => { setStep('menu'); setPath([]); }} className="px-6 py-3 bg-white border border-gray-200 hover:bg-gray-50 text-gray-700 font-semibold rounded-lg shadow-sm transition-all">Go Home</button>
            </div>
          </div>
        );
      }

      return null;
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
